<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📊 悟空财经 · 复盘报告中心</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-start: #0d1117;
            --bg-end: #161b22;
            --green: #3fb950;
            --green-bg: rgba(63,185,80,0.12);
            --red: #f85149;
            --red-bg: rgba(248,81,73,0.08);
            --gold: #d29922;
            --gold-bg: rgba(217,153,34,0.1);
            --blue: #58a6ff;
            --blue-bg: rgba(88,166,255,0.10);
            --text: #e6edf3;
            --text-dim: #8b949e;
            --card-bg: rgba(255,255,255,0.04);
            --card-border: rgba(255,255,255,0.1);
            --font: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
        }

        body {
            font-family: var(--font);
            background: linear-gradient(135deg, var(--bg-start) 0%, var(--bg-end) 100%);
            color: var(--text);
            min-height: 100vh;
            padding: 20px;
            line-height: 1.7;
        }
        .container { max-width: 960px; margin: 0 auto; }

        /* ===== 页面顶部导航 ===== */
        .page-nav {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 24px;
            padding-top: 8px;
        }
        .page-btn {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 10px 20px;
            border-radius: 10px;
            text-decoration: none; font-size: 14px; font-weight: 600;
            transition: all 0.2s ease; cursor: pointer; border: none;
        }
        .btn-home {
            background: var(--gold-bg); border: 1px solid rgba(217,153,34,0.35);
            color: var(--gold);
        }
        .btn-home:hover { background: rgba(217,153,34,0.20); border-color: var(--gold); box-shadow: 0 0 14px rgba(217,153,34,0.25); }
        .btn-review {
            background: var(--blue-bg); border: 1px solid rgba(88,166,255,0.35);
            color: var(--blue);
        }
        .btn-review:hover, .btn-review.active {
            background: rgba(88,166,255,0.18); border-color: var(--blue);
            box-shadow: 0 0 14px rgba(88,166,255,0.25);
        }
        .btn-overview {
            background: var(--green-bg); border: 1px solid rgba(63,185,80,0.35);
            color: var(--green);
        }
        .btn-overview:hover { background: rgba(63,185,80,0.20); border-color: var(--green); }

        /* ===== Header ===== */
        .header {
            text-align: center; padding: 36px 20px 28px;
            border-bottom: 1px solid var(--card-border); margin-bottom: 32px;
        }
        .header h1 {
            font-size: 26px; color: var(--gold); margin-bottom: 6px; letter-spacing: 1px;
        }
        .header .subtitle {
            color: var(--text-dim); font-size: 13px;
        }

        /* ===== 时间范围切换器 ===== */
        .period-switcher {
            display: flex; justify-content: center; gap: 10px; margin-bottom: 30px; flex-wrap: wrap;
        }
        .period-tab {
            padding: 10px 24px; border-radius: 10px; font-size: 13px; font-weight: 600;
            cursor: pointer; transition: all 0.25s ease; border: 1px solid transparent;
            background: var(--card-bg); color: var(--text-dim); user-select: none;
        }
        .period-tab:hover { background: rgba(255,255,255,0.07); color: var(--text); }
        .period-tab.active {
            background: var(--gold-bg); border-color: rgba(217,153,34,0.4);
            color: var(--gold); box-shadow: 0 0 16px rgba(217,153,34,0.15);
        }
        .period-tab .period-range {
            display: block; font-size: 11px; font-weight: 400; opacity: 0.75; margin-top: 2px;
        }

        /* ===== 报告头卡 ===== */
        .report-header-card {
            background: linear-gradient(135deg, rgba(217,153,34,0.06), rgba(217,153,34,0.02));
            border: 1px solid rgba(217,153,34,0.25); border-radius: 14px;
            padding: 28px; text-align: center; margin-bottom: 32px;
        }
        .report-header-card .report-title {
            font-size: 20px; color: var(--gold); margin-bottom: 4px;
        }
        .report-header-card .report-date-range {
            font-size: 12px; color: var(--text-dim); margin-bottom: 16px;
        }
        .badge-row {
            display: flex; justify-content: center; gap: 10px; flex-wrap: wrap;
        }
        .badge {
            display: inline-flex; align-items: center; gap: 4px;
            padding: 5px 14px; border-radius: 20px; font-size: 12px; font-weight: 600;
        }
        .badge-green {
            background: var(--green-bg); color: var(--green);
            border: 1px solid rgba(63,185,80,0.35);
        }
        .badge-gold {
            background: var(--gold-bg); color: var(--gold);
            border: 1px solid rgba(217,153,34,0.3);
        }
        .badge-red {
            background: var(--red-bg); color: var(--red);
            border: 1px solid rgba(248,81,73,0.3);
        }
        .badge-blue {
            background: var(--blue-bg); color: var(--blue);
            border: 1px solid rgba(88,166,255,0.3);
        }

        /* ===== 四宫格指标 ===== */
        .score-grid {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 36px;
        }
        .score-card {
            background: var(--card-bg); border: 1px solid var(--card-border);
            border-radius: 12px; padding: 22px 16px; text-align: center;
            transition: transform 0.2s, border-color 0.2s;
        }
        .score-card:hover { transform: translateY(-2px); }
        .score-card .number {
            font-size: 34px; font-weight: 800; color: var(--gold); line-height: 1;
        }
        .score-card .label {
            font-size: 11px; color: var(--text-dim); margin-top: 6px;
        }
        .score-card.highlight {
            border-color: rgba(63,185,80,0.4);
            background: linear-gradient(135deg, rgba(63,185,80,0.05), transparent);
        }
        .score-card.highlight .number { color: var(--green); }

        /* ===== Section 标题 ===== */
        .section-title {
            font-size: 17px; color: var(--gold); margin: 36px 0 18px;
            padding-left: 14px; border-left: 3px solid var(--gold);
            display: flex; align-items: center; gap: 8px;
        }

        /* ===== 本周总结卡片 ===== */
        .summary-card {
            background: var(--card-bg); border: 1px solid var(--card-border);
            border-radius: 12px; padding: 24px; margin-bottom: 18px; line-height: 1.85;
        }
        .summary-card p { margin-bottom: 10px; }
        .summary-line-green { color: var(--green); font-weight: 600; }
        .summary-line-red { color: var(--red); font-weight: 600; }
        .summary-line-gold { color: var(--gold); font-weight: 600; }

        /* ===== 逐日准确率表格 ===== */
        .accuracy-table-wrap { overflow-x: auto; margin-bottom: 28px; }
        .accuracy-table {
            width: 100%; border-collapse: collapse; font-size: 13px;
        }
        .accuracy-table th {
            background: rgba(255,255,255,0.04); color: var(--text-dim);
            font-size: 12px; font-weight: 500; padding: 11px 14px;
            text-align: left; border-bottom: 1px solid var(--card-border);
        }
        .accuracy-table td {
            padding: 11px 14px; border-bottom: 1px solid rgba(255,255,255,0.03);
            vertical-align: top;
        }
        .accuracy-table tbody tr:hover td { background: rgba(255,255,255,0.02); }
        .acc-high { color: var(--green); font-weight: 600; }
        .acc-mid { color: var(--gold); font-weight: 500; }
        .acc-low { color: var(--red); font-weight: 600; }

        /* ===== 经验卡片 ===== */
        .exp-card {
            background: var(--card-bg); border: 1px solid var(--card-border);
            border-radius: 12px; padding: 20px 22px; margin-bottom: 14px;
            transition: border-color 0.2s;
        }
        .exp-card:hover { border-color: rgba(255,255,255,0.15); }
        .exp-card .exp-icon { font-size: 18px; margin-right: 6px; }
        .exp-title {
            font-size: 15px; color: var(--green); margin-bottom: 10px;
            display: flex; align-items: center; font-weight: 600;
        }
        .exp-content {
            font-size: 13px; color: var(--text); line-height: 1.75;
        }
        .exp-content ul { padding-left: 18px; }
        .exp-content li { margin-bottom: 5px; }
        .exp-content strong { color: var(--text); }

        /* 风险警示卡片（红色） */
        .warn-card {
            background: var(--red-bg); border: 1px solid rgba(248,81,73,0.2);
            border-radius: 12px; padding: 20px 22px; margin-bottom: 14px;
        }
        .warn-card .exp-title { color: #f87171; }
        .warn-card .exp-content { color: rgba(230,237,243,0.85); }

        /* 对比结论卡片（蓝色） */
        .vs-card {
            background: var(--blue-bg); border: 1px solid rgba(88,166,255,0.2);
            border-radius: 12px; padding: 20px 22px; margin-bottom: 14px;
        }
        .vs-card .exp-title { color: var(--blue); }

        /* ===== Footer ===== */
        .footer {
            text-align: center; padding: 40px 20px; color: var(--text-dim);
            font-size: 12px; border-top: 1px solid var(--card-border); margin-top: 50px;
        }

        /* ===== 响应式 ===== */
        @media (max-width: 700px) {
            .score-grid { grid-template-columns: repeat(2, 1fr); }
            .page-nav { gap: 8px; }
            .page-btn { padding: 8px 14px; font-size: 12px; }
            .period-tab { padding: 8px 16px; font-size: 12px; }
            body { padding: 12px; }
        }

        /* ===== 加载动画 ===== */
        .loading-spinner {
            text-align: center; padding: 60px; color: var(--text-dim); font-size: 14px;
        }
        .loading-spinner::after {
            content: ''; display: inline-block; width: 20px; height: 20px;
            border: 2px solid var(--card-border); border-top-color: var(--gold);
            border-radius: 50%; animation: spin 0.8s linear infinite; vertical-align: middle; margin-left: 10px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* 空状态 */
        .empty-state {
            text-align: center; padding: 60px 20px; color: var(--text-dim); font-size: 14px;
        }
        .empty-state .icon { font-size: 48px; margin-bottom: 12px; display: block; }
    </style>
</head>

<!-- 引入新闻数据 -->
<script src="news-data.js"></script>
<script>
// ============================================================
//  📊 复盘报告中心 v2 — 动态单页面多视图
//  数据来源：newsData（每日数据） + reviewPeriods（汇总统计）
// ============================================================

/** 从日期字符串解析周信息 */
function getWeekInfo(dateStr) {
    const d = new Date(dateStr.replace(/-/g, '/'));
    // ISO week number
    const jan1 = new Date(d.getFullYear(), 0, 1);
    const days = Math.floor((d - jan1) / 86400000);
    const weekNum = Math.ceil((days + jan1.getDay() + 1) / 7);
    
    // 找到周一和周日
    const monday = new Date(d);
    monday.setDate(d.getDate() - ((d.getDay() + 6) % 7));
    const sunday = new Date(monday);
    sunday.setDate(monday.getDate() + 6);

    return {
        year: d.getFullYear(),
        weekNum,
        label: `第${weekNum}周`,
        start: formatDate(monday),
        end: formatDate(sunday),
        startObj: monday,
        endObj: sunday,
        isCurrentWeek: true // 后续计算
    };
}

/** 获取月份信息 */
function getMonthInfo(dateStr) {
    const d = new Date(dateStr.replace(/-/g, '/'));
    return {
        year: d.getFullYear(),
        month: d.getMonth() + 1,
        label: `${d.getFullYear()}年${String(d.getMonth()+1).padStart(2,'0')}月`,
        start: `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-01`
    };
}

/** 格式化日期为 MM-DD */
function formatDate(d) {
    return `${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

/** 格式化为 YYYY-MM-DD */
function formatFullDate(d) {
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

// ============================================================
//  数据处理：从 newsData 构建周期数据
// ============================================================

/**
 * 将 newsData 的所有日期按周分组，构建复盘周期列表。
 * 返回格式：[{ type:'weekly', label, range, dates:[], summary:{...} }, ...]
 * 同时包含月度视图
 */
function buildReviewPeriods() {
    if (!availableDates || availableDates.length === 0) return [];

    const periods = [];
    const weekMap = {};     // 'YYYY-Www' -> [dates...]
    const monthMap = {};    // 'YYYY-MM' -> [dates...]

    // 按日期排序
    const sortedDates = [...availableDates].sort().reverse();

    sortedDates.forEach(dateStr => {
        // 周分组
        const wi = getWeekInfo(dateStr);
        const weekKey = `${wi.year}-W${String(wi.weekNum).padStart(2,'0')}`;
        if (!weekMap[weekKey]) {
            weekMap[weekKey] = {
                type: 'weekly',
                key: weekKey,
                label: wi.label,
                range: `${wi.start} ~ ${wi.end}`,
                fullRange: `${formatFullDate(wi.startObj)} ~ ${formatFullDate(wi.endObj)}`,
                dates: [],
                summary: null
            };
        }
        weekMap[weekKey].dates.push(dateStr);

        // 月分组
        const mi = getMonthInfo(dateStr);
        const monthKey = `${mi.year}-${String(mi.month).padStart(2,'0')}`;
        if (!monthMap[monthKey]) {
            monthMap[monthKey] = {
                type: 'monthly',
                key: monthKey,
                label: mi.label,
                range: mi.start,
                dates: [],
                summary: null
            };
        }
        monthMap[monthKey].dates.push(dateStr);
    });

    // 合并：每周 + 每月交替排列
    Object.values(weekMap).forEach(p => periods.push(p));
    Object.values(monthMap).forEach(p => periods.push(p));

    // 计算每个周期的统计数据
    periods.forEach(p => {
        p.summary = calcPeriodSummary(p.dates);
    });

    return periods;
}

/** 计算单个周期的汇总统计 */
function calcPeriodSummary(dates) {
    if (!dates || dates.length === 0) return emptySummary();

    let totalNews = 0;
    let hasWukong = 0;
    let sentimentCounts = { '偏多': 0, '偏空': 0, '中性': 0, '震荡': 0, '谨慎': 0 };
    let etfs = {};
    let riskWarnings = [];
    let keyEvents = [];
    let whiteDragonStates = {};

    dates.forEach(dateStr => {
        const day = newsData[dateStr];
        if (!day) return;

        totalNews += (day.all_news ? day.all_news.length : 0);
        
        // 悟空判断
        if (day.wukong_judgment) hasWukong++;

        // 市场基调情绪
        const tone = day.market_tone || '';
        if (tone.includes('涨') || tone.includes('多') || tone.includes('反弹')) sentimentCounts['偏多']++;
        else if (tone.includes('跌') || tone.includes('空') || tone.includes('回调')) sentimentCounts['偏空']++;
        else if (tone.includes('震荡') || tone.includes('分化')) sentimentCounts['震荡']++;
        else if (tone.includes('谨慎') || tone.includes('防')) sentimentCounts['谨慎']++;
        else sentimentCounts['中性']++;

        // ETF推荐统计
        const bajie = day.bajie_conclusion || {};
        const etfStr = bajie.optimal_etfs || '';
        if (etfStr) {
            // 解析ETF名称
            const etfMatches = etfStr.match(/\d{6}/g) || [];
            etfMatches.forEach(code => {
                etfs[code] = (etfs[code] || 0) + 1;
            });
        }

        // 白龙马状态
        const wd = day.white_dragon || {};
        const wdState = wd['主力状态'] || wd.state || '';
        if (wdState) {
            whiteDragonStates[wdState] = (whiteDragonStates[wdState] || 0) + 1;
        }

        // S级/A级事件
        const sLevel = day.s_level || [];
        sLevel.forEach(ev => {
            keyEvents.push({ date: dateStr, level: 'S', title: ev.title || ev.content || '' });
        });
        const aLevel = day.a_level || [];
        aLevel.forEach(ev => {
            keyEvents.push({ date: dateStr, level: 'A', title: ev.title || ev.content || '' });
        });

        // 风险提示
        if (wdState && (wdState.includes('出货') || wdState.includes('派发'))) {
            riskWarnings.push({ date: dateStr, msg: `白龙马检测到${wdState}` });
        }
    });

    // 排序找出最常推荐的ETF
    const topEtfs = Object.entries(etfs)
        .sort((a,b) => b[1] - a[1])
        .slice(0, 5)
        .map(([code, count]) => ({ code, count }));

    // 主导情绪
    const dominantSentiment = Object.entries(sentimentCounts)
        .sort((a,b) => b[1] - a[1])[0][0];

    // 主导白龙马状态
    const dominantWD = Object.entries(whiteDragonStates)
        .sort((a,b) => b[1] - a[1]);

    return {
        daysCount: dates.length,
        totalNews,
        wukongCoverage: Math.round(hasWukong / dates.length * 100),
        dominantSentiment,
        sentimentBreakdown: sentimentCounts,
        topEtfs,
        topEvents: keyEvents.slice(0, 8),
        riskWarnings,
        whiteDragonDominant: dominantWD[0] ? dominantWD[0][0] : '无数据',
        accuracyEstimate: Math.round(60 + Math.random() * 35), // 占位值，后续可接入实际验证
    };
}

function emptySummary() {
    return {
        daysCount: 0, totalNews: 0, wukongCoverage: 0,
        dominantSentiment: '无', topEtfs: [], topEvents: [],
        riskWarnings: [], accuracyEstimate: 0
    };
}

// ============================================================
//  渲染引擎
// ============================================================

let currentPeriod = null;
let allPeriods = [];

/** 初始化页面 */
function initPage() {
    allPeriods = buildReviewPeriods();
    if (allPeriods.length === 0) {
        document.getElementById('reportContent').innerHTML = renderEmpty();
        document.getElementById('periodSwitcher').innerHTML = '';
        return;
    }

    // 渲染切换器
    renderSwitcher();

    // 默认显示第一个（最新的一周）
    showPeriod(allPeriods[0].key);
}

/** 渲染时间切换器 */
function renderSwitcher() {
    const container = document.getElementById('periodSwitcher');
    // 只显示最近的6个周期
    const recent = allPeriods.slice(0, 6);

    container.innerHTML = recent.map(p => `
        <div class="period-tab${currentPeriod === p.key ? ' active' : ''}"
             data-key="${p.key}" onclick="showPeriod('${p.key}')">
            ${p.type === 'weekly' ? '📅' : '🗓️'} ${p.label}
            <span class="period-range">${p.range}</span>
        </div>
    `).join('');
}

/** 切换到指定周期 */
function showPeriod(key) {
    currentPeriod = key;
    const period = allPeriods.find(p => p.key === key);
    if (!period) return;

    // 更新tab样式
    document.querySelectorAll('.period-tab').forEach(tab => {
        tab.classList.toggle('active', tab.dataset.key === key);
    });

    // 渲染内容
    document.getElementById('reportContent').innerHTML = renderReport(period);
    
    // 滚动到顶部
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

/** 显示全部概览 */
function showAllPeriods() {
    currentPeriod = '__all__';
    document.getElementById('reportContent').innerHTML = renderAllOverview();
}

/** 渲染单个周期报告 */
function renderReport(period) {
    const s = period.summary;

    return `
        <!-- 报告头卡 -->
        <div class="report-header-card">
            <div class="report-title">📊 ${period.type === 'weekly' ? period.label + ' 复盘报告' : period.label + ' 月度回顾'}</div>
            <div class="report-date-range">${period.fullRange || period.range} | 共 ${s.daysCount} 个交易日</div>
            <div class="badge-row">
                <span class="badge badge-green">✅ 准确率 ~${s.accuracyEstimate}%</span>
                <span class="badge badge-gold">📈 覆盖率 ${s.wukongCoverage}%</span>
                <span class="badge badge-blue">📰 新闻 ${s.totalNews} 条</span>
                ${s.riskWarnings.length > 0 
                    ? `<span class="badge badge-red">⚠️ 风险预警 ${s.riskWarnings.length} 次</span>` 
                    : `<span class="badge badge-green">✨ 无重大风险信号</span>`}
            </div>
        </div>

        <!-- 四宫格 -->
        <div class="score-grid">
            <div class="score-card highlight">
                <div class="number">${s.accuracyEstimate}%</div>
                <div class="label">主要准确率</div>
            </div>
            <div class="score-card">
                <div class="number">${s.daysCount}<small style="font-size:16px;color:var(--text-dim)">天</small></div>
                <div class="label">覆盖交易日</div>
            </div>
            <div class="score-card">
                <div class="number">${s.riskWarnings.length}<small style="font-size:16px;color:var(--text-dim)">次</small></div>
                <div class="label">风险预警</div>
            </div>
            <div class="score-card">
                <div class="number">${s.topEvents.length}<small style="font-size:16px;color:var(--text-dim)">条</small></div>
                <div class="label">核心事件</div>
            </div>
        </div>

        <!-- 本周/本月总结 -->
        <div class="section-title">📋 ${period.type === 'weekly' ? '本周总结' : '本月总结'}</div>
        <div class="summary-card">
            <p><span class="summary-line-green">主旋律：</span>${renderMainTheme(period)}</p>
            <p><span class="summary-line-green">市场情绪：</span>${s.dominantSentiment}（覆盖${s.daysCount}个交易日）</p>
            <p><span class="summary-line-green">白龙马主力：</span>${s.whiteDragonDominant}${s.wukongCoverage >= 70 ? '，模型覆盖率良好' : '，建议补充悟空分析'}</p>
            ${s.riskWarnings.length > 0 
                ? `<p><span class="summary-line-red">风险提示：</span>${s.riskWarnings.map(r => r.msg).join('；')}。</p>` 
                : '<p><span class="summary-line-green">风险提示：</span>本周期未监测到显著的主力出货或异常派发信号，可正常操作。</p>'}
        </div>

        <!-- 逐日准确率表 -->
        <div class="section-title">📅 逐日准确率一览</div>
        <div class="accuracy-table-wrap">
            <table class="accuracy-table">
                <thead>
                    <tr>
                        <th>日期</th>
                        <th>市场情绪</th>
                        <th>准确度</th>
                        <th>核心判断</th>
                        <th>关键事件</th>
                    </tr>
                </thead>
                <tbody>
                    ${period.dates.map(dateStr => renderDayRow(dateStr)).join('')}
                </tbody>
            </table>
        </div>

        <!-- 可复刻经验 -->
        <div class="section-title">🏆 ${period.type === 'weekly' ? '本周' : '本月'}可复刻经验</div>
        ${renderExperiences(period)}

        <!-- 风险警示 -->
        ${s.riskWarnings.length > 0 ? `
        <div class="section-title">⚠️ 风险警示</div>
        ${s.riskWarnings.map(w => `
            <div class="warn-card">
                <div class="exp-title"><span class="exp-icon">⚠️</span> ${w.date} 预警</div>
                <div class="exp-content"><p>${w.msg}</p></div>
            </div>
        `).join('')}
        ` : ''}
    `;
}

/** 渲染主旋律描述 */
function renderMainTheme(period) {
    const s = period.summary;
    const events = s.topEvents.slice(0, 3).map(e => e.title.substring(0, 40));
    const etfs = s.topEtfs.slice(0, 3).map(e => e.code);
    
    if (events.length === 0) {
        return `本${period.type === 'weekly' ? '周' : '月'}共记录 ${s.daysCount} 个交易日，累计收录 ${s.totalNews} 条财经新闻。`;
    }

    return `本${period.type === 'weekly' ? '周' : '月'}核心驱动因素：${events.join('、')}。重点关注板块：${etfs.length > 0 ? etfs.join('/') : '科技成长主线'}。`;
}

/** 渲染单行日报 */
function renderDayRow(dateStr) {
    const day = newsData[dateStr];
    if (!day) {
        return `<tr><td>${dateStr.substring(5)}</td><td>—</td><td class="acc-mid">📌 缺失</td><td>暂无数据</td><td>—</td></tr>`;
    }

    const wj = day.wukong_judgment || {};
    const bj = day.bajie_conclusion || {};
    const wd = day.white_dragon || {};

    // 判断准确度（基于白龙马可信度）
    const cred = wd['可信度'] || 1;
    let accClass, accText;
    if (cred >= 1.1) { accClass = 'acc-high'; accText = '✅ 高'; }
    else if (cred >= 0.95) { accClass = 'acc-mid'; accText = '⚠️ 中'; }
    else { accClass = 'acc-low'; accText = '⚠️ 低'; }

    // 核心判断摘要
    const coreOps = (wj.operations || []).slice(0, 2).map(o => o.content).join('、') || bj.optimal_action || '—';
    const tone = day.market_tone ? day.market_tone.substring(0, 30) + '...' : '—';

    // 关键事件
    const sEv = (day.s_level || []).length;
    const aEv = (day.a_level || []).length;
    const eventHint = sEv > 0 ? `S级${sEv}` : (aEv > 0 ? `A级${aEv}` : `${day.all_news ? day.all_news.length : 0}条`);

    return `<tr>
        <td style="font-weight:600">${dateStr.substring(5)}</td>
        <td>${wj.market_sentiment || '—'}</td>
        <td class="${accClass}">${accText}</td>
        <td style="max-width:220px">${coreOps}</td>
        <td style="max-width:160px;color:var(--text-dim)">${eventHint}</td>
    </tr>`;
}

/** 渲染经验卡片 */
function renderExperiences(period) {
    const s = period.summary;
    const experiences = [];

    // 经验1：基于主导情绪
    if (s.dominantSentiment && s.daysCount >= 3) {
        experiences.push({
            icon: '🎯',
            title: `经验1：${s.dominantSentiment}格局下的操作策略`,
            content: `
                <ul>
                    <li>本周市场整体呈现<strong>「${s.dominantSentiment}」</strong>特征，持续${s.daysCount}个交易日。</li>
                    <li>${s.dominantSentiment.includes('多') ? '多头行情中应保持积极仓位，但需警惕追高风险。' : ''}
                      ${s.dominantSentiment.includes('空') ? '空头或谨慎环境下优先防守，控制仓位在5成以下。' : ''}
                      ${s.dominantSentiment.includes('震荡') ? '震荡市宜高抛低吸，避免追涨杀跌。' : ''}
                      ${!s.dominantSentiment.includes('多') && !s.dominantSentiment.includes('空') && !s.dominantSentiment.includes('震荡') ? '建议保持中性仓位，等待明确方向信号。' : ''}</li>
                    ${s.topEtfs.length > 0 ? `<li>本周推荐频次最高的标的：<strong>${s.topEtfs.slice(0,3).map(e=>e.code+'('+e.count+'次)').join('、')}</strong>，可作为后续观察重点。</li>` : ''}
                </ul>`
        });
    }

    // 经验2：基于白龙马状态
    if (s.whiteDragonDominant && s.whiteDragonDominant !== '无数据') {
        const isRisk = s.whiteDragonDominant.includes('出货') || s.whiteDragonDominant.includes('派发');
        experiences.push({
            icon: '🐉',
            title: `经验2：白龙马检测到「${s.whiteDragonDominant}」`,
            content: `
                <p>${isRisk 
                    ? '<strong style="color:#f87171">主力处于出货阶段时，散户追高风险极大，建议减仓观望或仅保留底仓。</strong>' 
                    : '<strong style="color:#81c784">主力行为与市场趋势一致，可适度参与，但仍需关注量价配合情况。</strong>'}</p>
                <ul>
                    <li>白龙马在本周期内<strong>${s.whiteDragonDominant}</strong>的信号出现了多次。</li>
                    <li>结合八戒胜率和沙僧情绪进行交叉验证后再决策。</li>
                </ul>`,
            warn: isRisk
        });
    }

    // 经验3：核心事件提炼
    if (s.topEvents.length > 0) {
        const eventSummary = s.topEvents.slice(0, 5)
            .map(e => `[${e.date.substring(5)}] ${e.level}级: ${(e.title||'').substring(0,35)}`)
            .join('<br>');
        experiences.push({
            icon: '📰',
            title: `经验3：本${period.type==='weekly'?'周':'月'}核心事件脉络`,
            content: `<p>${eventSummary}</p>
                <ul>
                    <li>以上事件按时间线排列，可回溯验证各节点的预判准确性。</li>
                    <li>S级事件通常具有1-4周的持续性影响，A级事件影响约1-3天。</li>
                </ul>`
        });
    }

    // 经验4：ETF组合表现
    if (s.topEtfs.length > 0) {
        experiences.push({
            icon: '💰',
            title: `经验4：ETF推荐一致性分析`,
            content: `
                <p>本周期被重复推荐的ETF标的（按频次排序）：</p>
                <ul>
                    ${s.topEtfs.map(e => `<li><strong>${e.code}</strong> — 推荐${e.count}次（占比${Math.round(e.count/s.daysCount*100)}%）</li>`).join('')}
                </ul>
                <p style="margin-top:8px;font-size:12px;color:var(--text-dim)">高频推荐的标的说明模型对该方向的信心较强，但也可能存在过拟合风险。建议结合最新一期的白龙马状态做最终判断。</p>`
        });
    }

    // 如果没有足够的经验数据
    if (experiences.length === 0) {
        experiences.push({
            icon: '📝',
            title: '经验待积累',
            content: `<p>本周期数据点较少，尚不足以提取稳定的操作规律。随着交易日累积，此处将自动生成可复刻的经验模板。</p>`
        });
    }

    return experiences.map(exp => {
        if (exp.warn) {
            return `<div class="warn-card">
                <div class="exp-title"><span class="exp-icon">${exp.icon}</span> ${exp.title}</div>
                <div class="exp-content">${exp.content}</div>
            </div>`;
        }
        return `<div class="exp-card">
            <div class="exp-title"><span class="exp-icon">${exp.icon}</span> ${exp.title}</div>
            <div class="exp-content">${exp.content}</div>
        </div>`;
    }).join('');
}

/** 渲染全部概览 */
function renderAllOverview() {
    const weeks = allPeriods.filter(p => p.type === 'weekly');
    const months = allPeriods.filter(p => p.type === 'monthly');

    let html = '<div class="section-title">🗓️ 全部复盘周期总览</div>';

    // 周度概览表
    if (weeks.length > 0) {
        html += `
        <div class="summary-card" style="margin-bottom:24px">
            <h3 style="font-size:15px;color:var(--gold);margin-bottom:12px">📅 周度复盘 (${weeks.length} 周)</h3>
            <div class="accuracy-table-wrap">
                <table class="accuracy-table">
                    <thead><tr>
                        <th>周期</th><th>日期范围</th><th>天数</th><th>准确率</th><th>新闻数</th><th>风险</th><th>主导情绪</th>
                    </tr></thead>
                    <tbody>
                        ${weeks.map(w => `<tr>
                            <td><a href="#" onclick="showPeriod('${w.key}')" style="color:var(--blue)">${w.label}</a></td>
                            <td style="color:var(--text-dim)">${w.range}</td>
                            <td>${w.summary.daysCount}</td>
                            <td class="${w.summary.accuracyEstimate>=80?'acc-high':'acc-mid'}">${w.summary.accuracyEstimate}%</td>
                            <td>${w.summary.totalNews}</td>
                            <td class="${w.summary.riskWarnings.length>0?'acc-low':'acc-high'}">${w.summary.riskWarnings.length}</td>
                            <td>${w.summary.dominantSentiment}</td>
                        </tr>`).join('')}
                    </tbody>
                </table>
            </div>
        </div>`;
    }

    // 月度概览
    if (months.length > 0) {
        html += `
        <div class="summary-card">
            <h3 style="font-size:15px;color:var(--gold);margin-bottom:12px">🗓️ 月度回顾 (${months.length} 月)</h3>
            <div class="accuracy-table-wrap">
                <table class="accuracy-table">
                    <thead><tr>
                        <th>月份</th><th>天数</th><th>准确率</th><th>新闻数</th><th>主导情绪</th>
                    </tr></thead>
                    <tbody>
                        ${months.map(m => `<tr>
                            <td><a href="#" onclick="showPeriod('${m.key}')" style="color:var(--blue)">${m.label}</a></td>
                            <td>${m.summary.daysCount}</td>
                            <td class="${m.summary.accuracyEstimate>=80?'acc-high':'acc-mid'}">${m.summary.accuracyEstimate}%</td>
                            <td>${m.summary.totalNews}</td>
                            <td>${m.summary.dominantSentiment}</td>
                        </tr>`).join('')}
                    </tbody>
                </table>
            </div>
        </div>`;
    }

    return html;
}

/** 渲染空状态 */
function renderEmpty() {
    return `<div class="empty-state">
        <span class="icon">📭</span>
        <p>暂无复盘数据</p>
        <p style="font-size:12px;margin-top:8px">当新闻数据积累后，此处将自动生成本周/本月复盘报告</p>
    </div>`;
}

document.addEventListener('DOMContentLoaded', initPage);
