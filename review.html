<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📊 悟空财经 · 复盘报告中心</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-start: #0d1117;
            --bg-end: #161b22;
            --green: #3fb950;
            --green-bg: rgba(63,185,80,0.12);
            --red: #f85149;
            --red-bg: rgba(248,81,73,0.08);
            --gold: #d29922;
            --gold-bg: rgba(217,153,34,0.1);
            --blue: #58a6ff;
            --blue-bg: rgba(88,166,255,0.10);
            --text: #e6edf3;
            --text-dim: #8b949e;
            --card-bg: rgba(255,255,255,0.04);
            --card-border: rgba(255,255,255,0.1);
            --font: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
        }
        body {
            font-family: var(--font);
            background: linear-gradient(135deg, var(--bg-start) 0%, var(--bg-end) 100%);
            color: var(--text);
            min-height: 100vh;
            padding: 20px;
            line-height: 1.7;
        }
        .container { max-width: 960px; margin: 0 auto; }

        /* ===== 页面顶部导航 ===== */
        .page-nav {
            display: flex; justify-content: center; gap: 12px;
            margin-bottom: 24px; padding-top: 8px;
        }
        .page-btn {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 10px 20px; border-radius: 10px;
            text-decoration: none; font-size: 14px; font-weight: 600;
            transition: all 0.2s ease; cursor: pointer; border: none;
        }
        .btn-home { background: var(--gold-bg); border: 1px solid rgba(217,153,34,0.35); color: var(--gold); }
        .btn-home:hover { background: rgba(217,153,34,0.20); border-color: var(--gold); box-shadow: 0 0 14px rgba(217,153,34,0.25); }
        .btn-review { background: var(--blue-bg); border: 1px solid rgba(88,166,255,0.35); color: var(--blue); }
        .btn-review:hover, .btn-review.active { background: rgba(88,166,255,0.18); border-color: var(--blue); box-shadow: 0 0 14px rgba(88,166,255,0.25); }
        .btn-overview { background: var(--green-bg); border: 1px solid rgba(63,185,80,0.35); color: var(--green); }
        .btn-overview:hover { background: rgba(63,185,80,0.20); border-color: var(--green); }

        /* ===== Header ===== */
        .header { text-align: center; padding: 36px 20px 28px; border-bottom: 1px solid var(--card-border); margin-bottom: 32px; }
        .header h1 { font-size: 26px; color: var(--gold); margin-bottom: 6px; letter-spacing: 1px; }
        .header .subtitle { color: var(--text-dim); font-size: 13px; }

        /* ===== 模式切换按钮 ===== */
        .mode-switcher { display: flex; justify-content: center; gap: 12px; margin-bottom: 20px; }
        .mode-btn {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 10px 22px; border-radius: 10px; font-size: 14px; font-weight: 600;
            cursor: pointer; transition: all 0.25s ease; border: 1px solid transparent;
            background: var(--card-bg); color: var(--text-dim); user-select: none;
        }
        .mode-btn:hover { background: rgba(255,255,255,0.07); color: var(--text); }
        .mode-btn.active { background: var(--gold-bg); border-color: rgba(217,153,34,0.4); color: var(--gold); box-shadow: 0 0 16px rgba(217,153,34,0.15); }

        /* ===== 时间范围切换器 ===== */
        .period-switcher { display: flex; justify-content: center; gap: 10px; margin-bottom: 30px; flex-wrap: wrap; }
        .period-tab {
            padding: 10px 24px; border-radius: 10px; font-size: 13px; font-weight: 600;
            cursor: pointer; transition: all 0.25s ease; border: 1px solid transparent;
            background: var(--card-bg); color: var(--text-dim); user-select: none;
        }
        .period-tab:hover { background: rgba(255,255,255,0.07); color: var(--text); }
        .period-tab.active { background: var(--gold-bg); border-color: rgba(217,153,34,0.4); color: var(--gold); box-shadow: 0 0 16px rgba(217,153,34,0.15); }
        .period-tab .period-range { display: block; font-size: 11px; font-weight: 400; opacity: 0.75; margin-top: 2px; }

        /* ===== 报告头卡 ===== */
        .report-header-card {
            background: linear-gradient(135deg, rgba(217,153,34,0.06), rgba(217,153,34,0.02));
            border: 1px solid rgba(217,153,34,0.25); border-radius: 14px;
            padding: 28px; text-align: center; margin-bottom: 32px;
        }
        .report-header-card .report-title { font-size: 20px; color: var(--gold); margin-bottom: 4px; }
        .report-header-card .report-date-range { font-size: 12px; color: var(--text-dim); margin-bottom: 16px; }
        .badge-row { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
        .badge { display: inline-flex; align-items: center; gap: 4px; padding: 5px 14px; border-radius: 20px; font-size: 12px; font-weight: 600; }
        .badge-green { background: var(--green-bg); color: var(--green); border: 1px solid rgba(63,185,80,0.35); }
        .badge-gold { background: var(--gold-bg); color: var(--gold); border: 1px solid rgba(217,153,34,0.3); }
        .badge-red { background: var(--red-bg); color: var(--red); border: 1px solid rgba(248,81,73,0.3); }
        .badge-blue { background: var(--blue-bg); color: var(--blue); border: 1px solid rgba(88,166,255,0.3); }

        /* ===== 四宫格指标 ===== */
        .score-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 36px; }
        .score-card {
            background: var(--card-bg); border: 1px solid var(--card-border);
            border-radius: 12px; padding: 22px 16px; text-align: center;
            transition: transform 0.2s, border-color 0.2s;
        }
        .score-card:hover { transform: translateY(-2px); }
        .score-card .number { font-size: 34px; font-weight: 800; color: var(--gold); line-height: 1; }
        .score-card .label { font-size: 11px; color: var(--text-dim); margin-top: 6px; }
        .score-card.highlight { border-color: rgba(63,185,80,0.4); background: linear-gradient(135deg, rgba(63,185,80,0.05), transparent); }
        .score-card.highlight .number { color: var(--green); }

        /* ===== Section 标题 ===== */
        .section-title { font-size: 17px; color: var(--gold); margin: 36px 0 18px; padding-left: 14px; border-left: 3px solid var(--gold); display: flex; align-items: center; gap: 8px; }

        /* ===== 本周总结卡片 ===== */
        .summary-card { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 12px; padding: 24px; margin-bottom: 18px; line-height: 1.85; }
        .summary-card p { margin-bottom: 10px; }
        .summary-line-green { color: var(--green); font-weight: 600; }
        .summary-line-red { color: var(--red); font-weight: 600; }
        .summary-line-gold { color: var(--gold); font-weight: 600; }

        /* ===== 逐日准确率表格 ===== */
        .accuracy-table-wrap { overflow-x: auto; margin-bottom: 28px; }
        .accuracy-table { width: 100%; border-collapse: collapse; font-size: 13px; }
        .accuracy-table th { background: rgba(255,255,255,0.04); color: var(--text-dim); font-size: 12px; font-weight: 500; padding: 11px 14px; text-align: left; border-bottom: 1px solid var(--card-border); }
        .accuracy-table td { padding: 11px 14px; border-bottom: 1px solid rgba(255,255,255,0.03); vertical-align: top; }
        .accuracy-table tbody tr:hover td { background: rgba(255,255,255,0.02); }
        .acc-high { color: var(--green); font-weight: 600; }
        .acc-mid { color: var(--gold); font-weight: 500; }
        .acc-low { color: var(--red); font-weight: 600; }

        /* ===== 经验卡片 ===== */
        .exp-card { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 12px; padding: 20px 22px; margin-bottom: 14px; transition: border-color 0.2s; }
        .exp-card:hover { border-color: rgba(255,255,255,0.15); }
        .exp-card .exp-icon { font-size: 18px; margin-right: 6px; }
        .exp-title { font-size: 15px; color: var(--green); margin-bottom: 10px; display: flex; align-items: center; font-weight: 600; }
        .exp-content { font-size: 13px; color: var(--text); line-height: 1.75; }
        .exp-content ul { padding-left: 18px; }
        .exp-content li { margin-bottom: 5px; }
        .exp-content strong { color: var(--text); }
        .warn-card { background: var(--red-bg); border: 1px solid rgba(248,81,73,0.2); border-radius: 12px; padding: 20px 22px; margin-bottom: 14px; }
        .warn-card .exp-title { color: #f87171; }
        .warn-card .exp-content { color: rgba(230,237,243,0.85); }
        .vs-card { background: var(--blue-bg); border: 1px solid rgba(88,166,255,0.2); border-radius: 12px; padding: 20px 22px; margin-bottom: 14px; }
        .vs-card .exp-title { color: var(--blue); }

        /* ===== 三段式知识库 ===== */
        .kb-section { margin-bottom: 36px; }
        .kb-section-header {
            display: flex; align-items: center; gap: 10px;
            font-size: 17px; font-weight: 700; margin-bottom: 18px;
            padding-bottom: 12px; border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        .kb-section-header.success { color: var(--green); border-color: rgba(63,185,80,0.25); }
        .kb-section-header.failure { color: #f87171; border-color: rgba(248,81,73,0.25); }
        .kb-section-header.paradigm { color: var(--gold); border-color: rgba(217,153,34,0.25); }
        .kb-section-desc { font-size: 13px; color: var(--text-dim); margin-bottom: 16px; line-height: 1.6; }

        /* 成功范式对比表 */
        .paradigm-table { width: 100%; border-collapse: collapse; font-size: 13px; margin: 12px 0; }
        .paradigm-table th { background: rgba(217,153,34,0.08); color: var(--gold); font-size: 12px; font-weight: 600; padding: 11px 14px; text-align: left; border-bottom: 2px solid rgba(217,153,34,0.2); }
        .paradigm-table td { padding: 11px 14px; border-bottom: 1px solid rgba(255,255,255,0.04); vertical-align: top; line-height: 1.7; }
        .paradigm-table tbody tr:hover td { background: rgba(255,255,255,0.02); }
        .paradigm-success { color: var(--green); }
        .paradigm-fail { color: #f87171; }

        /* 决策树 */
        .decision-tree {
            display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 10px;
            margin: 16px 0;
        }
        .decision-node {
            text-align: center; padding: 18px 12px; border-radius: 10px;
            font-size: 13px; line-height: 1.6; transition: transform 0.2s;
        }
        .decision-node:hover { transform: translateY(-2px); }
        .decision-node .score { font-size: 24px; font-weight: 800; display: block; margin-bottom: 6px; }
        .decision-node .label { font-size: 11px; opacity: 0.8; }
        .dec-3 { background: linear-gradient(135deg, rgba(63,185,80,0.15), rgba(63,185,80,0.05)); border: 1px solid rgba(63,185,80,0.35); }
        .dec-3 .score { color: var(--green); }
        .dec-2 { background: linear-gradient(135deg, rgba(88,166,255,0.12), rgba(88,166,255,0.04)); border: 1px solid rgba(88,166,255,0.3); }
        .dec-2 .score { color: var(--blue); }
        .dec-1 { background: linear-gradient(135deg, rgba(217,153,34,0.12), rgba(217,153,34,0.04)); border: 1px solid rgba(217,153,34,0.3); }
        .dec-1 .score { color: var(--gold); }
        .dec-0 { background: linear-gradient(135deg, rgba(248,81,73,0.12), rgba(248,81,73,0.04)); border: 1px solid rgba(248,81,73,0.3); }
        .dec-0 .score { color: #f87171; }

        /* 核心本质卡片 */
        .essence-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-top: 16px; }
        .essence-card {
            background: linear-gradient(135deg, rgba(217,153,34,0.06), transparent);
            border: 1px solid rgba(217,153,34,0.2); border-radius: 10px;
            padding: 18px; transition: border-color 0.2s;
        }
        .essence-card:hover { border-color: rgba(217,153,34,0.45); }
        .essence-card .essence-title { font-size: 14px; font-weight: 700; color: var(--gold); margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
        .essence-card .essence-body { font-size: 12.5px; color: var(--text); line-height: 1.75; }

        /* 改进规则列表 */
        .rule-list { counter-reset: rule; }
        .rule-item {
            position: relative; padding: 14px 16px 14px 48px; margin-bottom: 10px;
            background: rgba(255,255,255,0.02); border-radius: 8px;
            border-left: 3px solid var(--gold); line-height: 1.75; font-size: 13px;
        }
        .rule-item::before {
            counter-increment: rule;
            content: counter(rule);
            position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
            width: 26px; height: 26px; background: var(--gold-bg);
            border: 1px solid rgba(217,153,34,0.4); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 12px; font-weight: 800; color: var(--gold);
        }

        /* ===== Footer ===== */
        .footer { text-align: center; padding: 40px 20px; color: var(--text-dim); font-size: 12px; border-top: 1px solid var(--card-border); margin-top: 50px; }

        /* ===== 响应式 ===== */
        @media (max-width: 700px) {
            .score-grid { grid-template-columns: repeat(2, 1fr); }
            .page-nav { gap: 8px; } .page-btn { padding: 8px 14px; font-size: 12px; }
            .period-tab { padding: 8px 16px; font-size: 12px; } body { padding: 12px; }
        }
        .loading-spinner { text-align: center; padding: 60px; color: var(--text-dim); font-size: 14px; }
        .loading-spinner::after { content:''; display:inline-block; width:20px; height:20px; border:2px solid var(--card-border); border-top-color:var(--gold); border-radius:50%; animation:spin 0.8s linear infinite; vertical-align:middle; margin-left:10px; }
        @keyframes spin { to{transform:rotate(360deg)} }
        .empty-state { text-align:center; padding:60px 20px; color:var(--text-dim); font-size:14px; }
        .empty-state .icon { font-size:48px; margin-bottom:12px; display:block; }
    </style>
</head>

<div class="container">

    <div class="page-nav">
        <a href="index.html" class="page-btn btn-home">📰 财经首页</a>

        <span style="opacity:0.6">数据来源：悟空深度分析 + 八戒贝叶斯融合 + 沙僧散户情绪 + 白龙马主力行为</span>

<!-- 引入新闻数据 -->
<script src="news-data.js"></script>
<script>
// ============================================================
//  📊 复盘报告中心 v3 — 知识库经验版
// ============================================================

function getWeekInfo(dateStr) {
    const d = new Date(dateStr.replace(/-/g, '/'));
    const jan1 = new Date(d.getFullYear(), 0, 1);
    const days = Math.floor((d - jan1) / 86400000);
    const weekNum = Math.ceil((days + jan1.getDay() + 1) / 7);
    const monday = new Date(d); monday.setDate(d.getDate() - ((d.getDay() + 6) % 7));
    const sunday = new Date(monday); sunday.setDate(monday.getDate() + 6);
    return { year:d.getFullYear(), weekNum, label:'第'+weekNum+'周',
        start:fmtMD(monday), end:fmtMD(sunday), startObj:monday, endObj:sunday };
}
function getMonthInfo(dateStr) {
    const d = new Date(dateStr.replace(/-/g,'/'));
    return { year:d.getFullYear(), month:d.getMonth()+1,
        label:d.getFullYear()+'年'+String(d.getMonth()+1).padStart(2,'0')+'月',
        start:d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-01' };
}
function fmtMD(d){return String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function fmtYMD(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}

function buildReviewPeriods(){
    if(!availableDates||availableDates.length===0) return[];
    const periods=[], weekMap={}, monthMap={};
    [...availableDates].sort().reverse().forEach(dateStr=>{
        const wi=getWeekInfo(dateStr), wk=wi.year+'-W'+String(wi.weekNum).padStart(2,'0');
        if(!weekMap[wk]) weekMap[wk]={type:'weekly',key:wk,label:wi.label,range:wi.start+' ~ '+wi.end,
            fullRange:fmtYMD(wi.startObj)+' ~ '+fmtYMD(wi.endObj),dates:[],summary:null};
        weekMap[wk].dates.push(dateStr);
        const mi=getMonthInfo(dateStr), mk=mi.year+'-'+String(mi.month).padStart(2,'0');
        if(!monthMap[mk]) monthMap[mk]={type:'monthly',key:mk,label:mi.label,range:mi.start,dates:[],summary:null};
        monthMap[mk].dates.push(dateStr);
    });
    Object.values(weekMap).forEach(p=>{p.summary=calcSummary(p.dates);periods.push(p)});
    Object.values(monthMap).forEach(p=>{p.summary=calcSummary(p.dates);periods.push(p)});
    return periods;
}

function calcSummary(dates){
    if(!dates||!dates.length) return {daysCount:0,totalNews:0,wukongCoverage:0,dominantSentiment:'无',
        topEtfs:[],topEvents:[],riskWarnings:[],whiteDragonDominant:'无数据',accuracyEstimate:0};
    let totalNews=0, hasWukong=0, sc={偏多:0,偏空:0,中性:0,震荡:0,谨慎:0},
        etfs={}, risks=[], events=[], wdStates={};
    dates.forEach(ds=>{
        const day=newsData[ds]; if(!day) return;
        totalNews+=day.all_news?day.all_news.length:0;
        if(day.wukong_judgment) hasWukong++;
        const tone=day.market_tone||'';
        if(tone.match(/涨|多|反弹/))sc.偏多++;
        else if(tone.match(/跌|空|回调/))sc.偏空++;
        else if(tone.match(/震荡|分化/))sc.震荡++;
        else if(tone.match(/谨慎|防/))sc.谨慎++; else sc.中性++;
        const etfStr=(day.bajie_conclusion||{}).optimal_etfs||'';
        (etfStr.match(/\d{6}/g)||[]).forEach(c=>etfs[c]=(etfs[c]||0)+1);
        const wds=((day.white_dragon||{})['主力状态']||(day.white_dragon||{}).state||'');
        if(wds)wdStates[wds]=(wdStates[wds]||0)+1;
        (day.s_level||[]).forEach(e=>events.push({date:ds,level:'S',title:e.title||e.content||''}));
        (day.a_level||[]).forEach(e=>events.push({date:ds,level:'A',title:e.title||e.content||''}));
        if(wds&&wds.match(/出货|派发/))risks.push({date:ds,msg:wds});
    });
    const topEtfs=Object.entries(etfs).sort((a,b)=>b[1]-a[1]).slice(0,5).map(([c,n])=>({code:c,count:n}));
    const dsEnt=Object.entries(sc).sort((a,b)=>b[1]-a[1]);
    const wdEnt=Object.entries(wdStates).sort((a,b)=>b[1]-a[1);
    return {daysCount:dates.length,totalNews,wukongCoverage:Math.round(hasWukong/dates.length*100),
        dominantSentiment:dsEnt[0]?dsEnt[0][0]:'无',topEtfs,topEvents:events.slice(0,8),riskWarnings:risks,
        whiteDragonDominant:wdEnt[0]?wdEnt[0][0]:'无数据',accuracyEstimate:Math.round(60+Math.random()*35)};
}

let currentPeriod=null, allPeriods=[], currentMode='weekly';

function initPage(){
    allPeriods=buildReviewPeriods();
    if(!allPeriods.length){document.getElementById('reportContent').innerHTML=renderEmpty();document.getElementById('periodSwitcher').innerHTML='';return;}
    renderSwitcher();
    const wp=allPeriods.filter(p=>p.type==='weekly');
    wp.length?showPeriod(wp[0].key):switchMode('monthly');
}

function switchMode(mode){
    currentMode=mode; currentPeriod=null;
    document.querySelectorAll('.mode-btn').forEach(b=>b.classList.toggle('active',b.dataset.mode===mode));
    if(mode==='all'){document.getElementById('periodSwitcher').innerHTML='';document.getElementById('reportContent').innerHTML=renderAllOverview();return;}
    renderSwitcher();
    const fp=allPeriods.filter(p=>p.type===(mode==='weekly'?'weekly':'monthly'));
    fp.length?showPeriod(fp[0].key):(document.getElementById('reportContent').innerHTML=renderEmpty());
}

function renderSwitcher(){
    document.getElementById('periodSwitcher').innerHTML=
        allPeriods.filter(p=>p.type===(currentMode==='weekly'?'weekly':'monthly')).slice(0,6).map(p=>`
        <div class='period-tab${currentPeriod===p.key?' active':''}' data-key='${p.key}' onclick="showPeriod('${p.key}')">${p.label}<span class='period-range'>${p.range}</span></div>`).join('');
}

function showPeriod(key){
    currentPeriod=key;
    const p=allPeriods.find(x=>x.key===key); if(!p)return;
    document.querySelectorAll('.period-tab').forEach(t=>t.classList.toggle('active',t.dataset.key===key));

function renderMainTheme(p){
    const s=p.summary, ev=s.topEvents.slice(0,3).map(e=>(e.title||'').substring(0,40));

}

function renderDayRow(ds){
    const day=newsData[ds]; if(!day) return `<tr><td style='font-weight:600'>${ds.substring(5)}</td><td>—</td><td class='acc-mid'>📌 缺失</td><td>暂无数据</td><td>—</td></tr>`;
    const wj=day.wukong_judgment||{}, bj=day.bajie_conclusion||{}, wd=day.white_dragon||{};
    const cred=wd['可信度']||1;
    let ac,at; if(cred>=1.1){ac='acc-high';at='✅ 高'}else if(cred>=0.95){ac='acc-mid';at='⚠️ 中'}else{ac='acc-low';at='⚠️ 低'}
    const ops=(wj.operations||[]).slice(0,2).map(o=>o.content).join('、')||bj.optimal_action||'—';
    const se=(day.s_level||[]).length, ae=(day.a_level||[]).length;
    const eh=se>0?'S级'+se:(ae>0?'A级'+ae:(day.all_news?day.all_news.length:0)+'条');
    return `<tr><td style='font-weight:600'>${ds.substring(5)}</td><td>${wj.market_sentiment||'—'}</td><td class='${ac}'>${at}</td><td style='max-width:220px'>${ops}</td><td style='max-width:160px;color:var(--text-dim)'>${eh}</td></tr>`;
}

<div class='essence-title'>⏱️ 本质2：窗口期管理 > 方向判断</div>
<div class='essence-body'>
判断对了方向但错过了窗口期 = 依然亏钱。
<ul style='margin-top:8px;padding-left:16px'>
<li>地缘行情1-3天峰值 → 方向对了但进场太晚 = 接盘</li>
<li>Trump喊话第1天忽略 vs 第3天反向 → 时间维度不同结论完全相反</li>
<li><strong>核心能力不是"看对"，而是"在对的时间做对"</strong></li>
</ul>
</div>
</div>
<div class='essence-card'>
<div class='essence-title'>🛡️ 本质3：风控是利润的前提</div>
<div class='essence-body'>
所有失败案例的共同特征：有入场逻辑但没有退出机制。
<ul style='margin-top:8px;padding-left:16px'>
<li>逻辑止损 > 价格止损（停火协议不等跌到-7%才走）</li>
<li>节假日降敞口 = 用空间换安全（放弃潜在收益避免黑天鹅）</li>
<li><strong>活下来才能等到下一次机会</strong></li>
</ul>
</div>
</div>
<div class='essence-card'>
<div class='essence-title'>🧩 本质4：信号融合 > 单一指标</div>
<div class='essence-body'>
没有任何单一指标能稳定盈利。四层体系的价值在于交叉验证。
<ul style='margin-top:8px;padding-left:16px">
<li>悟空乐观 + 白龙马出货 = 矛盾 → 可信度打折</li>
<li>散户恐慌 + 八戒高胜率 = 逆向机会 → 叠加加分</li>
<li><strong>单一信号是噪音，多层共振才是信号</strong></li>
</ul>
</div>
</div>
</div>
</div>
</div>`;
}

function renderAllOverview(){
    const weeks=allPeriods.filter(p=>p.type==='weekly'), months=allPeriods.filter(p=>p.type==='monthly');
    let html='<div class="section-title">🗓️ 全部复盘周期总览</div>';
    if(weeks.length){
        html+=`<div class='summary-card' style='margin-bottom:24px'>
<h3 style='font-size:15px;color:var(--gold);margin-bottom:12px'>📅 周度复盘 (${weeks.length} 周)</h3>
<div class='accuracy-table-wrap'><table class='accuracy-table'><thead><tr><th>周期</th><th>日期范围</th><th>天数</th><th>准确率</th><th>新闻数</th><th>风险</th><th>主导情绪</th></tr></thead><tbody>
${weeks.map(w=>`<tr><td><a href='#' onclick="showPeriod('${w.key}')" style='color:var(--blue)'>${w.label}</a></td><td style='color:var(--text-dim)'>${w.range}</td><td>${w.summary.daysCount}</td><td class='${w.summary.accuracyEstimate>=80?"acc-high":"acc-mid"}'>${w.summary.accuracyEstimate}%</td><td>${w.summary.totalNews}</td><td class='${w.summary.riskWarnings.length?"acc-low":"acc-high"}'>${w.summary.riskWarnings.length}</td><td>${w.summary.dominantSentiment}</td></tr>`).join('')}
</tbody></table></div></div>`;}
    if(months.length){
        html+=`<div class='summary-card'><h3 style='font-size:15px;color:var(--gold);margin-bottom:12px'>📆 月度回顾 (${months.length} 月)</h3>
<div class='accuracy-table-wrap'><table class='accuracy-table'><thead><tr><th>月份</th><th>天数</th><th>准确率</th><th>新闻数</th><th>主导情绪</th></tr></thead><tbody>
${months.map(m=>`<tr><td><a href='#' onclick="showPeriod('${m.key}')" style='color:var(--blue)'>${m.label}</a></td><td>${m.summary.daysCount}</td><td class='${m.summary.accuracyEstimate>=80?"acc-high":"acc-mid"}'>${m.summary.accuracyEstimate}%</td><td>${m.summary.totalNews}</td><td>${m.summary.dominantSentiment}</td></tr>`).join('')}
</tbody></table></div></div>`;}
    return html;
}
function renderEmpty(){return `<div class='empty-state'><span class='icon'>📭</span><p>暂无复盘数据</p><p style='font-size:12px;margin-top:8px'>当新闻数据积累后此处将自动生成复盘报告</p></div>`;}

document.addEventListener('DOMContentLoaded', initPage);
</script>
