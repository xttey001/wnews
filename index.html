<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>悟空财经分析</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-start: #0d1117;
            --bg-end: #161b22;
            --green: #3fb950;
            --green-bg: rgba(63,185,80,0.12);
            --orange: #f0883e;
            --red: #f85149;
            --blue: #58a6ff;
            --gold: #d29922;
            --purple: #a371f7;
            --card-bg: rgba(255,255,255,0.04);
            --card-border: rgba(255,255,255,0.1);
            --text: #e6edf3;
            --text-dim: #8b949e;
            --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        body {
            font-family: var(--font);
            background: linear-gradient(135deg, var(--bg-start) 0%, var(--bg-end) 100%);
            color: var(--text);
            min-height: 100vh;
            padding: 20px;
            line-height: 1.7;
        }
        .container { max-width: 900px; margin: 0 auto; }

        /* ===== 页面切换导航 ===== */
        .page-nav {
            display: flex;
            justify-content: center;
            gap: 12px;
            position: sticky;
            top: 0;
            z-index: 100;
            background: linear-gradient(135deg, #0d1117, #161b22);
            padding: 12px 0 8px;
            backdrop-filter: blur(10px);
            backdrop-filter: blur(10px);
        }
        .page-nav .page-btn {
            padding: 10px 20px;
            border-radius: 10px;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.2s;
        }
        .page-nav .page-btn-timeline {
            background: rgba(63,185,80,0.15);
            border: 1px solid rgba(63,185,80,0.4);
            color: #3fb950;
        }
        .page-nav .page-btn-timeline:hover,
        .page-nav .page-btn-timeline.active {
            background: rgba(63,185,80,0.25);
            border-color: #3fb950;
            box-shadow: 0 0 12px rgba(63,185,80,0.3);
        }
        .page-nav .page-btn-review {
            background: rgba(255,193,7,0.1);
            border: 1px solid rgba(255,193,7,0.3);
            color: #d29922;
        }
        .page-nav .page-btn-review:hover {
            background: rgba(255,193,7,0.2);
            border-color: #d29922;
            box-shadow: 0 0 12px rgba(255,193,7,0.3);
        }

        /* ===== 标题 ===== */
        .header {
            text-align: center;
            margin-bottom: 32px;
            padding: 24px;
            background: var(--card-bg);
            border-radius: 16px;
            border: 1px solid var(--card-border);
        }
        .header h1 {
            font-size: 26px;
            margin-bottom: 4px;
            background: linear-gradient(135deg, var(--green) 0%, var(--blue) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .header .subtitle {
            font-size: 13px;
            color: var(--text-dim);
            margin-bottom: 8px;
            font-style: italic;
        }
        .header .date-tag {
            display: inline-block;
            margin-top: 10px;
            padding: 6px 14px;
            background: rgba(163,113,247,0.15);
            border: 1px solid rgba(163,113,247,0.3);
            border-radius: 8px;
            color: var(--purple);
            font-size: 13px;
        }

        /* ===== 导航 ===== */
        .nav-bar {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 28px;
            flex-wrap: wrap;
            padding: 14px;
            background: var(--card-bg);
            border-radius: 12px;
            border: 1px solid var(--card-border);
            align-items: center;
        }
        .date-btn {
            padding: 8px 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 13px;
            color: var(--text-dim);
        }
        .date-btn:hover {
            background: rgba(63,185,80,0.1);
            border-color: var(--green);
            color: var(--green);
        }
        .date-btn.active {
            background: var(--green-bg);
            border-color: var(--green);
            color: var(--green);
            font-weight: 600;
        }
        /* 日期选择器 */
        .date-picker-wrap {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 0 8px;
        }
        .date-picker-wrap label {
            font-size: 13px;
            color: var(--text-dim);
        }
        .date-picker {
            padding: 8px 12px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            color: var(--text);
            font-size: 13px;
            cursor: pointer;
            outline: none;
            font-family: var(--font);
        }
        .date-picker:hover {
            border-color: var(--green);
        }
        .date-picker:focus {
            border-color: var(--green);
            box-shadow: 0 0 0 2px rgba(63,185,80,0.2);
        }
        /* 前一日/后一日按钮 */
        .nav-arrow-btn {
            padding: 8px 14px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 13px;
            color: var(--text-dim);
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .nav-arrow-btn:hover:not(:disabled) {
            background: rgba(63,185,80,0.1);
            border-color: var(--green);
            color: var(--green);
        }
        .nav-arrow-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .nav-divider {
            width: 1px;
            height: 24px;
            background: rgba(255,255,255,0.1);
            margin: 0 4px;
        }

        /* ===== 区块通用 ===== */
        .section {
            background: var(--card-bg);
            border-radius: 14px;
            border: 1px solid var(--card-border);
            padding: 22px;
            margin-bottom: 24px;
        }
        .section-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        /* ===== 今日基调 ===== */
        .tone-section {
            border: 2px solid var(--gold);
            background: linear-gradient(135deg, rgba(210,153,34,0.08) 0%, rgba(210,153,34,0.03) 100%);
        }
        .tone-section .section-title { color: var(--gold); }
        .tone-content {
            font-size: 15px;
            line-height: 1.8;
            color: var(--text);
        }
        .tone-item {
            margin-bottom: 12px;
            padding: 10px;
            background: rgba(0,0,0,0.15);
            border-radius: 6px;
        }
        .tone-label {
            font-weight: 600;
            color: var(--gold);
            margin-right: 8px;
        }

        /* ===== 悟空判断 ===== */
        .judgment-section { 
            background: linear-gradient(135deg, rgba(163,113,247,0.08) 0%, rgba(88,166,255,0.05) 100%);
            border-color: rgba(163,113,247,0.2);
        }
        .judgment-section .section-title { color: var(--purple); }
        
        /* ===== 八戒贝叶斯 ===== */
        .bayesian-section {
            background: linear-gradient(135deg, rgba(255,193,7,0.08) 0%, rgba(255,152,0,0.05) 100%);
            border-color: rgba(255,193,7,0.2);
        }
        .bayesian-section .section-title { color: #FFC107; }
        .overall-card {
            background: rgba(0,0,0,0.2);
            border-radius: 10px;
            padding: 16px;
            margin-bottom: 16px;
        }
        .overall-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 14px;
        }
        .stat-item {
            text-align: center;
            padding: 10px;
            background: rgba(255,255,255,0.03);
            border-radius: 8px;
        }
        .stat-label { font-size: 12px; color: var(--text-dim); }
        .stat-value { font-size: 18px; font-weight: 700; margin-top: 4px; }
        .stat-value.high { color: var(--green); }
        .stat-value.medium { color: #FFC107; }
        .stat-value.low { color: #f44336; }
        .overall-conclusion {
            font-size: 14px;
            line-height: 1.6;
            padding: 12px;
            background: rgba(255,193,7,0.08);
            border-radius: 8px;
            border-left: 3px solid #FFC107;
        }
        .decision-matrix {
            margin-top: 16px;
        }
        .matrix-title {
            font-size: 14px;
            font-weight: 600;
            color: #FFC107;
            margin-bottom: 12px;
        }
        .matrix-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        .matrix-table th {
            text-align: left;
            padding: 8px;
            background: rgba(255,255,255,0.05);
            color: var(--text-dim);
            font-weight: 600;
        }
        .matrix-table td {
            padding: 8px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .win-rate { font-weight: 600; }
        .win-rate.high { color: var(--green); }
        .win-rate.medium { color: #FFC107; }
        .win-rate.low { color: #f44336; }

        /* 贝叶斯推断卡片 */
        .bayes-analysis-list { margin-top: 16px; }
        .bayes-card {
            background: rgba(0,0,0,0.2);
            border-radius: 10px;
            padding: 16px;
            margin-bottom: 12px;
        }
        .bayes-card-title {
            font-size: 14px;
            font-weight: 600;
            color: #FFC107;
            margin-bottom: 10px;
        }
        .bayes-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        .bayes-table th {
            text-align: left;
            padding: 7px 8px;
            background: rgba(255,255,255,0.05);
            color: var(--text-dim);
            font-weight: 600;
        }
        .bayes-table td {
            padding: 7px 8px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .bayes-table .posterior-row td {
            border-top: 2px solid rgba(255,193,7,0.3);
            background: rgba(255,193,7,0.05);
        }
        .key-variable {
            margin-top: 10px;
            font-size: 13px;
            color: var(--text-dim);
            padding: 8px 12px;
            background: rgba(255,255,255,0.03);
            border-radius: 6px;
        }

        /* 八戒最终结论 */
        .bajie-conclusion {
            margin-top: 16px;
            background: linear-gradient(135deg, rgba(255,193,7,0.12) 0%, rgba(255,152,0,0.08) 100%);
            border: 1px solid rgba(255,193,7,0.3);
            border-radius: 10px;
            padding: 16px;
        }
        .bajie-conclusion-title {
            font-size: 15px;
            font-weight: 700;
            color: #FFC107;
            margin-bottom: 12px;
        }
        .bajie-conclusion-row {
            font-size: 14px;
            margin-bottom: 8px;
        }
        .bc-label {
            color: var(--text-dim);
            font-weight: 600;
        }

        /* ===== 沙僧韭菜直觉 ===== */
        .sangsha-section {
            margin-top: 16px;
            background: linear-gradient(135deg, rgba(156,39,176,0.12) 0%, rgba(103,58,183,0.08) 100%);
            border: 1px solid rgba(156,39,176,0.3);
            border-radius: 12px;
            padding: 16px;
        }
        .sangsha-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .sangsha-meta {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
        }
        .sg-meta-tag {
            font-size: 12px;
            color: #ce93d8;
            background: rgba(156,39,176,0.2);
            padding: 2px 8px;
            border-radius: 10px;
        }
        .sg-sentiment {
            font-size: 15px;
            font-weight: 700;
            color: #ce93d8;
        }
        .sg-advice {
            font-size: 13px;
            color: var(--text-dim);
        }
        .sangsha-stats {
            display: flex;
            gap: 20px;
            margin-bottom: 16px;
        }
        .sg-stat {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .stat-label {
            font-size: 12px;
            color: var(--text-dim);
            margin-bottom: 4px;
        }
        .stat-value {
            font-size: 20px;
            font-weight: 700;
        }
        .stat-value.buy { color: #ef5350; }
        .stat-value.panic { color: #ffa726; }
        .sangsha-top-news {
            background: rgba(0,0,0,0.2);
            border-radius: 8px;
            padding: 12px;
        }
        .sg-top-title {
            font-size: 13px;
            font-weight: 600;
            color: #ce93d8;
            margin-bottom: 12px;
        }
        .sg-news-item {
            display: flex;
            align-items: flex-start;
            margin-bottom: 10px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        .sg-news-item:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }
        .sg-news-rank {
            width: 22px;
            height: 22px;
            background: linear-gradient(135deg, #ef5350, #e53935);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 700;
            color: white;
            margin-right: 10px;
            flex-shrink: 0;
        }
        .sg-news-content {
            flex: 1;
        }
        .sg-news-title {
            font-size: 13px;
            color: var(--text);
            margin-bottom: 4px;
        }
        .sg-news-meta {
            display: flex;
            gap: 12px;
            font-size: 12px;
        }
        .sg-buy-prob {
            color: #ef5350;
            font-weight: 600;
        }
        .sg-tags {
            color: var(--text-dim);
        }
        .sg-date {
            color: var(--text-dim);
            font-size: 11px;
        }

        /* ===== 唐憎最终仲裁 ===== */
        .tang-sanzang-section {
            margin-top: 16px;
            background: linear-gradient(135deg, rgba(255,193,7,0.08) 0%, rgba(255,152,0,0.06) 100%);
            border: 1px solid rgba(255,193,7,0.3);
            border-radius: 12px;
            padding: 16px;
        }
        .tang-position-banner {
            display: flex;
            gap: 12px;
            margin-bottom: 14px;
            align-items: center;
        }
        .ts-position {
            font-size: 15px;
            font-weight: 700;
            color: #FFC107;
            background: rgba(255,193,7,0.15);
            padding: 4px 10px;
            border-radius: 8px;
        }
        .ts-action {
            font-size: 15px;
            font-weight: 600;
            color: #FFD54F;
        }
        .tang-body {
            font-size: 13px;
            color: var(--text);
        }
        .ts-subtitle {
            font-weight: 700;
            color: #FFC107;
            margin: 8px 0 4px;
        }
        .ts-conflict-item {
            padding: 3px 0 3px 8px;
            color: #FFC107;
            font-size: 12px;
            border-left: 2px solid rgba(255,193,7,0.4);
            margin-bottom: 3px;
        }
        .ts-formula {
            margin-top: 10px;
            padding: 8px 10px;
            background: rgba(255,193,7,0.06);
            border-radius: 6px;
            font-size: 12px;
            color: #FFD54F;
            font-family: monospace;
        }
        .ts-risk-item {
            padding: 3px 0 3px 8px;
            color: #f44336;
            font-size: 12px;
            border-left: 2px solid rgba(244,67,54,0.5);
            margin-bottom: 3px;
        }
        .ts-conclusion {
            margin-top: 10px;
            padding: 8px 10px;
            background: rgba(76,175,80,0.1);
            border: 1px solid rgba(76,175,80,0.25);
            border-radius: 6px;
            font-size: 13px;
            color: #81C784;
        }

        /* ===== 白龙马主力行为 ===== */
        .white-dragon-section {
            margin-top: 16px;
            background: linear-gradient(135deg, rgba(33,150,243,0.12) 0%, rgba(25,118,210,0.08) 100%);
            border: 1px solid rgba(33,150,243,0.3);
            border-radius: 12px;
            padding: 16px;
        }
        .wd-main-state {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
        }
        .wd-label {
            font-size: 14px;
            color: var(--text-dim);
        }
        .wd-value {
            font-size: 16px;
            font-weight: 700;
        }
        .wd-stage {
            font-size: 13px;
            color: var(--text-dim);
        }
        .state-拉升 { color: var(--green); }
        .state-出货 { color: #ef5350; }
        .state-吸筹 { color: #29b6f6; }
        .state-洗盘 { color: #ffa726; }
        .state-分化 { color: #bdbdbd; }
        .state-观望 { color: var(--text-dim); }
        .wd-explain {
            font-size: 14px;
            color: var(--text);
            margin-bottom: 12px;
            padding: 10px;
            background: rgba(0,0,0,0.2);
            border-radius: 8px;
        }
        .wd-using-retail {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
            font-size: 14px;
        }
        .wd-using-retail.warning { color: #ef5350; }
        .wd-using-retail.normal { color: var(--green); }
        .wd-advice {
            font-size: 14px;
            font-weight: 600;
            color: #64b5f6;
            padding: 12px;
            background: rgba(33,150,243,0.15);
            border-radius: 8px;
        }

        .emotion-row {
            font-size: 14px;
            margin-bottom: 14px;
            padding-bottom: 14px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        .emotion-label { color: var(--text-dim); }
        .emotion-value { 
            color: var(--green); 
            font-weight: 600;
        }
        .analysis-list {
            margin-bottom: 16px;
        }
        .analysis-item {
            position: relative;
            padding-left: 18px;
            margin-bottom: 10px;
            font-size: 14px;
        }
        .analysis-item::before {
            content: '•';
            position: absolute;
            left: 0;
            color: var(--text-dim);
        }
        .strategy-box {
            background: linear-gradient(135deg, rgba(63,185,80,0.15) 0%, rgba(63,185,80,0.08) 100%);
            border: 1px solid rgba(63,185,80,0.3);
            border-radius: 10px;
            padding: 16px;
            margin-top: 8px;
        }
        .strategy-label {
            font-size: 13px;
            color: var(--green);
            font-weight: 600;
            margin-bottom: 10px;
        }
        .strategy-item {
            font-size: 14px;
            margin-bottom: 8px;
            line-height: 1.6;
        }

        /* ===== 新闻区块 ===== */
        .news-section.s-level .section-title { color: var(--red); }
        .news-section.a-level .section-title { color: var(--gold); }
        .news-section.douyin .section-title { color: var(--blue); }

        /* ===== 新闻卡片 ===== */
        .news-card {
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
            border-left: 4px solid;
            padding: 18px;
            margin-bottom: 16px;
        }
        .s-level .news-card { border-left-color: var(--red); }
        .a-level .news-card { border-left-color: var(--gold); }
        .douyin .news-card { border-left-color: var(--blue); }

        .news-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 12px;
        }
        .news-title {
            font-size: 16px;
            font-weight: 600;
            color: #fff;
            flex: 1;
        }
        .news-source {
            padding: 4px 10px;
            background: rgba(255,255,255,0.06);
            border-radius: 6px;
            font-size: 11px;
            color: var(--text-dim);
        }
        .news-row {
            margin: 10px 0;
            font-size: 14px;
        }
        .label { 
            color: var(--text-dim); 
            margin-right: 6px;
            font-size: 13px;
        }

        /* ===== 映射标签 ===== */
        .mapping-section {
            margin-top: 14px;
        }
        .mapping-row {
            margin-bottom: 12px;
        }
        .mapping-label {
            font-size: 13px;
            color: var(--text-dim);
            margin-bottom: 8px;
        }
        .tags-wrap {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .tag-item {
            display: inline-flex;
            align-items: center;
            gap: 0;
            padding: 0;
            border-radius: 6px;
            overflow: hidden;
            font-size: 12px;
            border: 1px solid rgba(255,255,255,0.15);
            transition: all 0.2s;
        }
        .tag-item:hover {
            transform: translateY(-1px);
            border-color: rgba(255,255,255,0.3);
        }
        .tag-sentiment {
            padding: 5px 8px;
            font-weight: 700;
            font-size: 11px;
        }
        .tag-sentiment.bullish { background: var(--red); color: #fff; }
        .tag-sentiment.bearish { background: var(--green); color: #fff; }
        .tag-sentiment.neutral { background: #6e7681; color: #fff; }
        .tag-sentiment.watch { background: var(--blue); color: #fff; }
        .tag-sentiment.avoid { background: var(--orange); color: #fff; }
        .tag-name {
            padding: 5px 10px;
            color: var(--text);
        }
        .tag-note {
            padding: 5px 8px;
            color: var(--text-dim);
            font-size: 11px;
            background: rgba(255,255,255,0.03);
        }

        /* ===== 警告提示 ===== */
        .warning-box {
            margin-top: 14px;
            padding: 12px 14px;
            background: rgba(248,129,73,0.1);
            border: 1px solid rgba(248,129,73,0.25);
            border-radius: 8px;
            font-size: 13px;
            color: var(--orange);
        }

        /* ===== 分隔线 ===== */
        .section-divider {
            display: flex;
            align-items: center;
            margin: 32px 0;
            color: var(--text-dim);
            font-size: 14px;
        }
        .section-divider::before,
        .section-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--card-border), transparent);
        }
        .section-divider span {
            padding: 0 16px;
            white-space: nowrap;
        }

        /* ===== 新闻专属贝叶斯分析 ===== */
        .news-bayes-card {
            margin: 16px 0 24px 0;
            background: rgba(33,150,243,0.08);
            border: 1px solid rgba(33,150,243,0.25);
            border-radius: 10px;
            padding: 16px;
        }
        .news-bayes-card .bayes-card-title {
            color: #2196F3;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(255,193,7,0.2);
        }
        .news-bayes-card .bayes-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
            margin-bottom: 12px;
        }
        .news-bayes-card .bayes-table th {
            background: rgba(33,150,243,0.15);
            color: #2196F3;
            padding: 8px 10px;
            text-align: left;
            font-weight: 600;
            border-bottom: 1px solid rgba(255,193,7,0.2);
        }
        .news-bayes-card .bayes-table td {
            padding: 8px 10px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            color: var(--text);
        }
        .news-bayes-card .bayes-table tr:last-child td {
            border-bottom: none;
        }
        .news-bayes-card .key-variable {
            display: inline-block;
            background: rgba(255,193,7,0.08);
            border: 1px solid rgba(255,193,7,0.25);
            border-radius: 6px;
            padding: 8px 12px;
            font-size: 12px;
            color: #FFC107;
            margin-top: 8px;
        }
        /* ===== Footer ===== */
        footer {
            text-align: center;
            margin-top: 48px;
            padding: 24px;
            color: #484f58;
            font-size: 12px;
        }

        /* ===== 响应式 ===== */
        @media (max-width: 768px) {
            .header h1 { font-size: 22px; }
            .section { padding: 16px; }
            .news-card { padding: 14px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 页面切换导航 -->
        <div class="page-nav">
            <a href="index.html" class="page-btn page-btn-timeline active">📅 新闻时间线</a>
            <a href="review.html" class="page-btn page-btn-review">📊 14天复盘报告</a>
        </div>

        <div class="header">
            <h1>🐵 悟空财经分析</h1>
            <div class="subtitle">不盲从主流解读，用逻辑和数据说话</div>
            <div class="date-tag" id="dateDisplay"></div>
        </div>

        <!-- 日期导航 -->
        <div class="nav-bar" id="navBar">
            <button class="nav-arrow-btn" id="prevBtn" onclick="goToPrevDate()">◀ 前一日</button>
            <div class="nav-divider"></div>
            <div class="date-picker-wrap">
                <label for="datePicker">选择日期：</label>
                <input type="date" id="datePicker" class="date-picker" onchange="onDatePickerChange(this.value)">
            </div>
            <div class="nav-divider"></div>
            <button class="nav-arrow-btn" id="nextBtn" onclick="goToNextDate()">后一日 ▶</button>
        </div>

        <!-- 内容区 -->
        <div id="content"></div>

        <footer>
            <p>数据来源：天集 ProSearch · 权威财经媒体</p>
        </footer>
    </div>

    <script src="news-data.js"></script>
    <script>
        let currentDate = availableDates[0];

        function formatDate(dateStr) {
            const [y, m, d] = dateStr.split('-');
            return `${parseInt(m)}月${parseInt(d)}日`;
        }

        function initNav() {
            // 设置日期选择器的范围
            const datePicker = document.getElementById('datePicker');
            if (availableDates.length > 0) {
                datePicker.min = availableDates[availableDates.length - 1]; // 最早日期
                datePicker.max = availableDates[0]; // 最晚日期
                datePicker.value = currentDate;
            }
            updateNavButtons();
        }

        function updateNavButtons() {
            const currentIndex = availableDates.indexOf(currentDate);
            document.getElementById('prevBtn').disabled = currentIndex >= availableDates.length - 1;
            document.getElementById('nextBtn').disabled = currentIndex <= 0;
        }

        function onDatePickerChange(value) {
            if (value && availableDates.includes(value)) {
                currentDate = value;
                updateUI();
            }
        }

        function goToPrevDate() {
            const currentIndex = availableDates.indexOf(currentDate);
            if (currentIndex < availableDates.length - 1) {
                currentDate = availableDates[currentIndex + 1];
                updateUI();
            }
        }

        function goToNextDate() {
            const currentIndex = availableDates.indexOf(currentDate);
            if (currentIndex > 0) {
                currentDate = availableDates[currentIndex - 1];
                updateUI();
            }
        }

        function updateUI() {
            // 更新日期选择器
            document.getElementById('datePicker').value = currentDate;
            // 更新导航按钮状态
            updateNavButtons();
            // 更新日期显示
            document.getElementById('dateDisplay').textContent = formatDate(currentDate);
            renderContent();
        }

        function getSentimentClass(sentiment) {
            const map = {
                '利好': 'bullish',
                '利空': 'bearish',
                '关注': 'watch',
                '警惕': 'avoid',
                '回避': 'avoid'
            };
            return map[sentiment] || 'neutral';
        }

        function renderTags(items) {
            if (!items || !items.length) return '';
            let html = '<div class="tags-wrap">';
            items.forEach(item => {
                // 兼容纯字符串和对象两种格式
                const isObj = typeof item === 'object' && item !== null;
                const sentiment = isObj ? item.sentiment : '';
                const name = isObj ? item.name : item;
                const note = isObj ? (item.note || '') : '';
                const cls = getSentimentClass(sentiment);
                html += `<span class="tag-item">`;
                if (sentiment) {
                    html += `<span class="tag-sentiment ${cls}">${sentiment}</span>`;
                }
                html += `<span class="tag-name">${name}</span>`;
                if (note) {
                    html += `<span class="tag-note">${note}</span>`;
                }
                html += '</span>';
            });
            html += '</div>';
            return html;
        }

        function renderNewsCard(item) {
            const emoji = item.emoji || '';
            const title = item.title || '';
            const source = item.source || '';
            const keyPoint = item.key_point || item.summary || '';
            const duration = item.duration || 'N/A';
            const signal = item.signal || '';
            let html = `
                <div class="news-card">
                    <div class="news-header">
                        <div class="news-title">${emoji} ${title}</div>
                        ${source ? '<div class="news-source">来源：' + source + '</div>' : ''}
                    </div>
                    <div class="news-row"><span class="label">要点：</span>${keyPoint}</div>
                    <div class="news-row"><span class="label">影响时长：</span>${duration}</div>`;

            if (item.etfs && item.etfs.length) {
                html += `
                    <div class="mapping-section">
                        <div class="mapping-row">
                            <div class="mapping-label">📈 ETF映射：</div>
                            ${renderTags(item.etfs)}
                        </div>
                    </div>`;
            }

            if (item.stocks && item.stocks.length) {
                // 纯字符串个股默认标记为利好，保持与ETF标签风格一致
                const stockItems = item.stocks.map(s => {
                    if (typeof s === 'object') return s;
                    return { name: s, sentiment: '利好' };
                });
                html += `
                    <div class="mapping-section">
                        <div class="mapping-row">
                            <div class="mapping-label">✨ 个股映射：</div>
                            ${renderTags(stockItems)}
                        </div>
                    </div>`;
            }

            if (item.signal) {
                html += `<div class="warning-box">💡 ${item.signal}</div>`;
            }

            html += '</div>';
            return html;
        }

        // 渲染单条新闻的贝叶斯分析
        function renderNewsBayesAnalysis(newsTitle, bayesData) {
            if (!bayesData) return '';
            const pc = bayesData.posterior >= 65 ? 'high' : bayesData.posterior >= 50 ? 'medium' : 'low';
            const priorJudg = bayesData.prior_judgment || '历史基准';
            const priorProb = bayesData.prior_prob || bayesData.prior || 50;
            const likelihoodJudg = bayesData.likelihood_judgment || '新闻信息强度';
            const likelihoodProb = bayesData.likelihood_prob || bayesData.likelihood || 50;
            const posterior = bayesData.posterior || 50;
            const expectedReturn = bayesData.expected_return || 'N/A';
            const confidence = bayesData.confidence_interval || bayesData.confidence || 'N/A';
            const keyVar = bayesData.key_variables || bayesData.key_variable || 'N/A';
            return `
            <div class="bayes-card news-bayes-card">
                <div class="bayes-card-title">🧮 八戒贝叶斯分析</div>
                <table class="bayes-table">
                    <thead>
                        <tr><th>维度</th><th>判断</th><th>概率</th></tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>先验（市场基准）</td>
                            <td>${priorJudg}</td>
                            <td>${priorProb}%</td>
                        </tr>
                        <tr>
                            <td>似然（数据验证）</td>
                            <td>${likelihoodJudg}</td>
                            <td>${likelihoodProb}%</td>
                        </tr>
                        <tr class="posterior-row">
                            <td>后验（综合）</td>
                            <td>做多概率</td>
                            <td><strong class="win-rate ${pc}">${posterior}%</strong></td>
                        </tr>
                        <tr>
                            <td>预期收益率</td>
                            <td>ETF/个股</td>
                            <td><strong>${expectedReturn}</strong></td>
                        </tr>
                        <tr>
                            <td>置信区间</td>
                            <td>95%CI</td>
                            <td>${confidence}</td>
                        </tr>
                    </tbody>
                </table>
                <div class="key-variable">💡 关键变量：${keyVar}</div>
            </div>`;
        }

        function renderContent() {
            const data = newsData[currentDate];
            if (!data) {
                document.getElementById('content').innerHTML = '<p style="text-align:center;color:#666;padding:60px;">该日期暂无数据</p>';
                return;
            }

            let html = '';

            // 今日基调
            if (data.market_tone) {
                html += `
                    <div class="section tone-section">
                        <div class="section-title">📊 今日基调</div>`;

                // 支持早报晚报双基调
                if (typeof data.market_tone === 'object') {
                    if (data.market_tone.早报) {
                        html += `<div class="tone-item"><span class="tone-label">早报：</span>${data.market_tone.早报}</div>`;
                    }
                    if (data.market_tone.晚报) {
                        html += `<div class="tone-item"><span class="tone-label">晚报：</span>${data.market_tone.晚报}</div>`;
                    }
                } else {
                    // 兼容旧格式（字符串）
                    html += `<div class="tone-content">${data.market_tone}</div>`;
                }

                html += `</div>`;
            }

            // 悟空今日判断
            if (data.wukong_judgment) {
                const wj = data.wukong_judgment;
                html += `
                    <div class="section judgment-section">
                        <div class="section-title">📈 悟空今日判断</div>`;
                
                // 兼容两种字段格式
                const emotion = wj.emotion || wj.market_sentiment || wj.market_view;
                if (emotion) {
                    html += `
                        <div class="emotion-row">
                            <span class="emotion-label">大盘情绪：</span>
                            <span class="emotion-value">${emotion}</span>
                        </div>`;
                }

                // 兼容两种字段格式
                const analysisList = wj.analysis || wj.core_analysis || wj.key_factors;
                if (analysisList && analysisList.length) {
                    html += '<div class="analysis-list">';
                    analysisList.forEach(a => {
                        html += `<div class="analysis-item">${a}</div>`;
                    });
                    html += '</div>';
                }

                // 兼容操作建议字段（active_patterns）
                const strategyList = wj.strategy || wj.operations || wj.active_patterns;
                if (strategyList && strategyList.length) {
                    html += `
                        <div class="strategy-box">
                            <div class="strategy-label">今日操作参考：</div>`;
                    strategyList.forEach(s => {
                        const label = s.type || s.id ? `${s.type || s.id} ` : '';
                        const text = s.content || s.action || s.name || s;
                        html += `<div class="strategy-item">${label}${text}</div>`;
                    });
                    html += '</div>';
                }

                // 新增风险提示字段
                const riskAlerts = wj.risk_alerts;
                if (riskAlerts && riskAlerts.length) {
                    html += `
                        <div class="warning-box">
                            <div style="font-weight:600;margin-bottom:6px;">⚠️ 风险提示：</div>`;
                    riskAlerts.forEach(r => {
                        html += `<div style="margin-bottom:4px;">• ${r}</div>`;
                    });
                    html += '</div>';
                }

                html += '</div>';
            }

            // 决策矩阵 + 八戒最终结论（汇总部分）
            const bj = data.bajie_bayesian || buildBajieBayesian(data) || {};
            const overall = bj.overall || data.bajie_conclusion || {};

            if (bj && (bj.decision_matrix && bj.decision_matrix.length)) {
                // 过滤决策矩阵：只保留高置信度信号（胜率≥65%或≤35%），最多10条
                const filteredMatrix = bj.decision_matrix
                    .filter(m => (m.win_rate >= 65 || m.win_rate <= 35))
                    .sort((a, b) => Math.abs(b.win_rate - 50) - Math.abs(a.win_rate - 50))
                    .slice(0, 10);

                if (filteredMatrix.length > 0) {
                    // 计算总体信号
                    const avgRate = Math.round(filteredMatrix.reduce((s, m) => s + m.win_rate, 0) / filteredMatrix.length);
                    const signalLabel = avgRate >= 65 ? '看多' : avgRate <= 35 ? '看空' : '中性';
                    const signalClass = avgRate >= 65 ? 'high' : avgRate <= 35 ? 'low' : 'medium';

                    html += `
                    <div class="section matrix-section">
                        <div class="section-title">📊 决策矩阵 <span style="font-size:12px;color:#888;font-weight:normal;">（筛选${filteredMatrix.length}条高信号）</span></div>
                        <div style="margin-bottom:10px;padding:8px 12px;background:${avgRate >= 65 ? '#fff3e0' : avgRate <= 35 ? '#e8f5e9' : '#f5f5f5'};border-radius:8px;display:flex;justify-content:space-between;align-items:center;">
                            <span>总体信号：<strong class="win-rate ${signalClass}">${signalLabel}</strong></span>
                            <span>平均胜率：<strong>${avgRate}%</strong></span>
                        </div>
                        <div class="decision-matrix">
                            <table class="matrix-table">
                                <thead>
                                    <tr>
                                        <th>新闻</th>
                                        <th>胜率</th>
                                        <th>预期收益</th>
                                        <th>风险比</th>
                                        <th>建议</th>
                                    </tr>
                                </thead>
                                <tbody>`;
                    filteredMatrix.forEach(m => {
                        const rc = m.win_rate >= 65 ? 'high' : m.win_rate <= 35 ? 'low' : 'medium';
                        html += `
                                    <tr>
                                        <td>${m.news || ''}</td>
                                        <td><span class="win-rate ${rc}">${m.win_rate || 'N/A'}%</span></td>
                                        <td>${m.expected_return || 'N/A'}</td>
                                        <td>${m.risk_ratio || 'N/A'}</td>
                                        <td>${m.action || ''}</td>
                                    </tr>`;
                    });
                    html += `
                                </tbody>
                            </table>
                        </div>
                    </div>`;
                }

                // 八戒最终结论
                if (overall) {
                    const wrStr = overall.win_rate || '';
                    const wrNum = parseInt(wrStr) || 50;
                    const wrClass = wrNum >= 65 ? 'high' : wrNum >= 50 ? 'medium' : 'low';
                    html += `
                    <div class="section conclusion-section">
                        <div class="section-title">🧠 八戒最终结论</div>
                        <div class="bajie-conclusion">
                            <div class="bajie-conclusion-row"><span class="bc-label">最优行动：</span><span>${overall.best_action || overall.optimal_action || overall.action || ''}</span></div>
                            <div class="bajie-conclusion-row"><span class="bc-label">最优ETF组合：</span><span>${overall.best_etfs || overall.optimal_etfs || ''}</span></div>
                            <div class="bajie-conclusion-row"><span class="bc-label">胜率：</span><span class="win-rate ${wrClass}">${wrStr || overall.win_rate || ''}</span></div>
                            <div class="bajie-conclusion-row"><span class="bc-label">最大回撤警戒：</span><span class="win-rate low">${overall.stop_loss || overall.max_drawdown || ''}</span></div>
                        </div>
                    </div>`;
                }

            }

            // ========== 唐僧最终仲裁模块 ==========
            const ts = data.tang_sanzang;
            if (ts) {
                const tsAction = ts.最终行动 || ts.action || '';
                const tsPosition = ts.仓位 || '';
                const tsNote = ts.唐憎结论 || ts.conclusion || '';
                const conflicts = Array.isArray(ts.仲裁矛盾) ? ts.仲裁矛盾 : [];
                const riskTriggers = Array.isArray(ts.风控触发) ? ts.风控触发 : [];
                const formulas = ts.仓位公式 || {};

                html += `
                <div class="section tang-sanzang-section">
                    <div class="section-title">🙏 唐僧最终仲裁</div>
                    <div class="tang-position-banner">
                        <span class="ts-position">${tsPosition}</span>
                        <span class="ts-action">${tsAction}</span>
                    </div>
                    <div class="tang-body">
                        <div class="ts-subtitle">仲裁矛盾：</div>`;
                conflicts.forEach(c => {
                    const cType = typeof c === 'object' ? (c.类型 || c.type || '') : '';
                    const cDesc = typeof c === 'object' ? (c.描述 || c.desc || String(c)) : String(c);
                    const cCoef = typeof c === 'object' ? (c.唐憎系数 || c.coef || '') : '';
                    html += `<div class="ts-conflict-item">⚠️ ${cType ? cType + '：' : ''}${cDesc}${cCoef ? '（' + cCoef + '）' : ''}</div>`;
                });
                html += `
                        <div class="ts-formula">仓位公式：${formulas.基础仓位 || ''} × ${formulas.唐憎系数 || ''} × ${formulas.风控系数 || '1.0'} = ${formulas.结果 || tsPosition}</div>`;
                if (riskTriggers.length > 0) {
                    html += `<div class="ts-subtitle">🚨 风控触发：</div>`;
                    riskTriggers.forEach(r => {
                        html += `<div class="ts-risk-item">${typeof r === 'string' ? r : (r.条件 || r.condition || JSON.stringify(r))}</div>`;
                    });
                }
                html += `
                        <div class="ts-conclusion">✅ 唐憎结论：${tsNote}</div>
                    </div>
                </div>`;
            }

            // ========== 沙僧韭菜直觉模块（处理全量新闻）==========
            const sg = data.sangsha_module || data.sangsha;
            if (sg) {
                const sgTotalNews = sg.total_news_count || 0;
                const sgTimeWindow = sg.time_window || '7天累积';
                html += `
                <div class="section sangsha-section">
                    <div class="section-title">🧅 沙僧韭菜直觉</div>
                    <div class="sangsha-meta">
                        <span class="sg-meta-tag">分析全量新闻 ${sgTotalNews} 条</span>
                        <span class="sg-meta-tag">${sgTimeWindow}</span>
                    </div>
                    <div class="sangsha-header">
                        <span class="sg-sentiment">市场情绪: ${sg.overall_sentiment || '平稳'}</span>
                        <span class="sg-advice">${sg.advice || ''}</span>
                    </div>
                    <div class="sangsha-stats">
                        <div class="sg-stat">
                            <span class="stat-label">平均买入概率</span>
                            <span class="stat-value buy">${sg.avg_buy_prob || 0}%</span>
                        </div>
                        <div class="sg-stat">
                            <span class="stat-label">平均恐慌概率</span>
                            <span class="stat-value panic">${sg.avg_panic_prob || 0}%</span>
                        </div>
                    </div>
                    <div class="sangsha-top-news">
                        <div class="sg-top-title">🔥 TOP 5 最易催动散户买入的新闻</div>`;
                
                const sgResults = sg.analysis_results || [];
                sgResults.slice(0, 5).forEach((r, i) => {
                    const buyProb = r.买入概率 || 0;
                    const tags = (r.情绪标签 || []).join(', ');
                    const dateTag = r.date || '';
                    const decayInfo = r.decay ? ` [${(r.decay*100).toFixed(0)}%权重]` : '';
                    html += `
                        <div class="sg-news-item">
                            <div class="sg-news-rank">${i+1}</div>
                            <div class="sg-news-content">
                                <div class="sg-news-title">${r.full_title || r.title || ''}</div>
                                <div class="sg-news-meta">
                                    <span class="sg-buy-prob">买入概率: ${buyProb}%</span>
                                    <span class="sg-tags">${tags}</span>
                                    ${dateTag ? `<span class="sg-date">${dateTag}${decayInfo}</span>` : ''}
                                </div>
                            </div>
                        </div>`;
                });
                
                html += `
                    </div>
                </div>`;
            }

            // ========== 白龙马主力行为模块 ==========
            const wd = data.white_dragon || data.white_dragon_decision;
            if (wd) {
                const usingRetail = wd.是否利用散户 ? '是' : '否';
                const retailClass = wd.是否利用散户 ? 'warning' : 'normal';
                html += `
                <div class="section white-dragon-section">
                    <div class="section-title">🐴 白龙马主力行为</div>
                    <div class="wd-main-state">
                        <span class="wd-label">主力状态:</span>
                        <span class="wd-value state-${wd.主力状态 || 'unknown'}">${wd.主力状态 || '观望'}</span>
                        <span class="wd-stage">(${wd.阶段 || '观察'})</span>
                    </div>
                    <div class="wd-explain">${wd.行为解释 || ''}</div>
                    <div class="wd-using-retail ${retailClass}">
                        <span class="wd-label">是否利用散户:</span>
                        <span class="wd-value">${usingRetail}</span>
                    </div>
                    <div class="wd-advice">${wd.综合建议 || ''}</div>
                </div>`;
            }

            // 分隔线
            html += `<div class="section-divider"><span>=== 新闻详情 ===</span></div>`;

            // 从每条新闻的 bayes_analysis 构建 bajie_bayesian 结构（兼容新旧数据格式）
            function buildBajieBayesian(data) {
                const allNews = [].concat(data.s_level || [], data.a_level || [], data.douyin || []);
                const newsAnalysis = [];
                const decisionMatrix = [];
                allNews.forEach(item => {
                    const ba = item.bayes_analysis;
                    if (ba) {
                        newsAnalysis.push({ news_title: item.title, ...ba });
                        const wr = ba.posterior || 50;
                        const action = wr >= 65 ? '✅ 坚定做多' : wr >= 50 ? '⚠️ 轻仓' : '❌ 回避';
                        decisionMatrix.push({
                            news: item.title.substring(0, 15) + '...',
                            win_rate: wr,
                            expected_return: ba.expected_return || 'N/A',
                            risk_ratio: wr >= 65 ? '1:3' : wr >= 50 ? '1:2' : '1:1',
                            action: action
                        });
                    }
                });
                if (newsAnalysis.length === 0) return null;
                return { news_analysis: newsAnalysis, decision_matrix: decisionMatrix };
            }

            // 智能匹配新闻和贝叶斯分析
            function findBayesForNews(newsTitle, newsAnalysisList, decisionMatrix) {
                if (!newsAnalysisList) return null;
                
                // 1. 精确匹配
                const exact = newsAnalysisList.find(na => na.news_title === newsTitle);
                if (exact) return exact;
                
                // 2. 核心概念匹配（提取2-4字的核心概念进行匹配）
                const titlePrefix = newsTitle.replace(/[：:].*$/, '');
                const coreConcepts = [];
                
                // 提取常见财经概念词
                const conceptPatterns = ['原油', '黄金', '美股', 'AI芯片', '芯片', 'CPO', '光模块', 'A股', '央行', '油气', '科技', '存储', '新能源', '锂电', '光伏', '医药', '银行', '地产'];
                conceptPatterns.forEach(concept => {
                    if (titlePrefix.includes(concept)) {
                        coreConcepts.push(concept);
                    }
                });
                
                // 按概念匹配
                for (const na of newsAnalysisList) {
                    for (const concept of coreConcepts) {
                        if (na.news_title.includes(concept)) {
                            return na;
                        }
                    }
                }
                
                // 3. 反向包含匹配
                for (const na of newsAnalysisList) {
                    if (newsTitle.includes(na.news_title) || na.news_title.includes(newsTitle.substring(0, 10))) {
                        return na;
                    }
                }

                // 4. 决策矩阵匹配
                if (decisionMatrix) {
                    for (const dm of decisionMatrix) {
                        // 检查决策矩阵的新闻名称是否在新闻标题中
                        if (newsTitle.includes(dm.news) || 
                            (dm.news.length > 4 && titlePrefix.includes(dm.news.substring(0, 6)))) {
                            const matched = newsAnalysisList.find(na => na.news_title === dm.news);
                            if (matched) return matched;
                        }
                        // 检查核心概念是否匹配
                        for (const concept of coreConcepts) {
                            if (dm.news.includes(concept)) {
                                const matched = newsAnalysisList.find(na => na.news_title === dm.news);
                                if (matched) return matched;
                            }
                        }
                    }
                }
                
                return null;
            }

            // S级
            if (data.s_level && data.s_level.length) {
                html += `
                    <div class="section news-section s-level">
                        <div class="section-title">🔴 S级（结构性叙事，影响1-4周）</div>`;
                data.s_level.forEach(item => {
                    html += renderNewsCard(item);
                    const bayes = item.bayes_analysis || findBayesForNews(item.title, bj?.news_analysis, bj?.decision_matrix);
                    if (bayes) {
                        html += renderNewsBayesAnalysis(item.title, bayes);
                    }
                });
                html += '</div>';
            }

            // A级
            if (data.a_level && data.a_level.length) {
                html += `
                    <div class="section news-section a-level">
                        <div class="section-title">🟡 A级（阶段性叙事，影响1-3天）</div>`;
                data.a_level.forEach(item => {
                    html += renderNewsCard(item);
                    const bayes = item.bayes_analysis || findBayesForNews(item.title, bj?.news_analysis, bj?.decision_matrix);
                    if (bayes) {
                        html += renderNewsBayesAnalysis(item.title, bayes);
                    }
                });
                html += '</div>';
            }

            // 抖音/平台
            if (data.douyin && data.douyin.length) {
                html += `
                    <div class="section news-section douyin">
                        <div class="section-title">📱 抖音/平台相关</div>`;
                data.douyin.forEach(item => {
                    html += renderNewsCard(item);
                    const bayes = item.bayes_analysis || findBayesForNews(item.title, bj?.news_analysis, bj?.decision_matrix);
                    if (bayes) {
                        html += renderNewsBayesAnalysis(item.title, bayes);
                    }
                });
                html += '</div>';
            }

            document.getElementById('content').innerHTML = html;
        }

        // 初始化
        initNav();
        updateUI();
    </script>
</body>
</html>
